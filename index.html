    // ══════════════════════════════════════════════════════════════
    if(layout==='elegant')return(
      <div style={{...cardStyle,background:d.cardBg,borderTop:`4px double ${isDone?ac:pc}`,borderLeft:`4px double ${isDone?ac:pc}33`}}>
        <CardHeader/>
        {/* Ligne décorative */}
        <div style={{height:2,background:`linear-gradient(90deg,${pc},${ac},${pc}33)`,opacity:.6}}/>
        {[0,1].map(pi=>{
          const oi=1-pi,won=match.winner===pi+1,lead=sw[pi]>sw[oi];
          const pn=pi===0?match.player1:match.player2,pclub=pi===0?match.p1Club:match.p2Club,pr=pi===0?match.p1Ranking:match.p2Ranking;
          const parts=splitDouble(pn,pr,pclub);
          return(
            <div key={pi} style={{display:'flex',alignItems:'center',padding:'14px 20px',borderBottom:pi===0?`1px solid rgba(255,255,255,.08)`:'none',opacity:isDone&&!won?.45:1}}>
              {/* Indicateur service */}
              <div style={{width:3,alignSelf:'stretch',background:match.server===pi+1&&isLive?pc:'transparent',marginRight:14,borderRadius:2,boxShadow:match.server===pi+1&&isLive?`0 0 8px ${pc}`:'none'}}/>
              {/* Nom joueur */}
              <div style={{flex:1}}>
                {parts.map((p,i)=>(
                  <div key={i} style={{marginBottom:i<parts.length-1?6:0}}>
                    <div style={{display:'flex',alignItems:'baseline',gap:10}}>
                      <span style={{fontFamily:'var(--fd)',fontSize:'clamp(15px,2.2vw,26px)',fontWeight:won?900:600,color:won?ac:tc,letterSpacing:won?'.5px':'0px',textTransform:'uppercase'}}>{won&&'🏆 '}{p.n}</span>
                      {p.r&&<span style={{fontFamily:'var(--fb)',fontSize:'clamp(10px,1.2vw,14px)',color:ac,fontWeight:700,border:`1px solid ${ac}66`,padding:'0 6px',borderRadius:2}}>{p.r}</span>}
                    </div>
                    {p.c&&<div style={{fontFamily:'var(--fb)',fontSize:'clamp(9px,1vw,12px)',opacity:.5,marginTop:2,letterSpacing:1,textTransform:'uppercase',color:tc}}>{p.c}</div>}
                  </div>
                ))}
              </div>
              {/* Score dans le jeu */}
              {isLive&&isPointMode&&<div style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:'clamp(22px,3vw,42px)',color:pi===0?pc:ac,minWidth:'clamp(36px,4vw,50px)',textAlign:'center',marginRight:20,textShadow:`0 0 16px ${pi===0?pc:ac}88`}}>{glTV(gs[pi])}</div>}
              {/* Scores par set */}
              <div style={{display:'flex',gap:8,marginRight:16}}>
                {match.sets.map((st,i)=>{
                  const setDone=checkSetWon(st)||(isDone&&i===match.sets.length-1&&st[0]!==st[1]);
                  const w=setDone&&st[pi]>st[oi];
                  return(
                    <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',minWidth:28}}>
                      <span style={{fontFamily:'var(--fd)',fontWeight:w?900:500,fontSize:d.scoreFontSize,color:w?'#fff':tc,opacity:w?1:.4,lineHeight:1}}>{st[pi]}</span>
                      {i===match.sets.length-1&&<div style={{width:'100%',height:2,background:w?ac:'transparent',marginTop:2,borderRadius:1}}/>}
                    </div>
                  );
                })}
              </div>
              {/* Sets gagnés */}
              <div style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:'clamp(24px,3.2vw,38px)',color:lead?ac:'rgba(255,255,255,.15)',minWidth:40,textAlign:'center',textShadow:lead?`0 0 16px ${ac}88`:'none'}}>{sw[pi]}</div>
            </div>
          );
        })}
        <div style={{height:2,background:`linear-gradient(90deg,${ac}33,${ac},${ac}33)`,opacity:.4}}/>
        {isDone&&<div style={{padding:'8px 20px',textAlign:'center',background:`${ac}12`}}><span style={{color:ac,fontWeight:700,fontSize:'clamp(13px,1.6vw,18px)',letterSpacing:2}}>{match.sets.map(s=>`${s[0]}–${s[1]}`).join('  ')}</span></div>}
        {!isDone&&<div style={{padding:'6px 20px',display:'flex',gap:12,alignItems:'center',fontSize:'clamp(10px,1.1vw,13px)',color:tc,opacity:.6,fontFamily:'var(--fb)'}}>{f.label}{tbLabel&&<span style={{color:pc,fontWeight:700,opacity:1}}>⚡ {tbLabel==='TB'?'Tie-Break':'Super TB'}</span>}{dur&&<span style={{marginLeft:'auto',color:ac,fontWeight:700,opacity:1,fontSize:'clamp(13px,1.6vw,20px)'}}>⏱ {dur}</span>}</div>}
        <StatsPanel/>
      </div>
    );

    // ══════════════════════════════════════════════════════════════
    // LAYOUT : STADIUM (US Open, Moderne) — score central énorme
    // ══════════════════════════════════════════════════════════════
    if(layout==='stadium'){
      const glow=layout==='stadium'&&themeKey==='moderne'?`0 0 30px ${pc}, 0 0 60px ${pc}44`:`0 0 20px ${pc}88`;
      return(
        <div style={{...cardStyle,background:d.cardBg}}>
          <CardHeader/>
          {/* Zone scoreboard centrale */}
          <div style={{padding:'16px 20px',background:`linear-gradient(180deg,${d.headerBg} 0%,transparent 100%)`}}>
            {/* En-tête scores */}
            <div style={{display:'flex',justifyContent:'flex-end',gap:20,marginBottom:8,paddingRight:20}}>
              {match.sets.map((_,i)=>(
                <div key={i} style={{minWidth:36,textAlign:'center',fontFamily:'var(--fb)',fontSize:'clamp(9px,1vw,12px)',color:tc,opacity:.4,letterSpacing:1,textTransform:'uppercase'}}>S{i+1}</div>
              ))}
              <div style={{minWidth:44,textAlign:'center',fontFamily:'var(--fb)',fontSize:'clamp(9px,1vw,12px)',color:ac,opacity:.7,letterSpacing:1}}>SET</div>
            </div>
            {/* Lignes joueurs */}
            {[0,1].map(pi=>{
              const oi=1-pi,won=match.winner===pi+1,lead=sw[pi]>sw[oi];
              const pn=pi===0?match.player1:match.player2,pclub=pi===0?match.p1Club:match.p2Club,pr=pi===0?match.p1Ranking:match.p2Ranking;
              const parts=splitDouble(pn,pr,pclub);
              return(
                <div key={pi} style={{display:'flex',alignItems:'center',gap:16,padding:'10px 0',borderBottom:pi===0?`1px solid rgba(255,255,255,.06)`:'none',opacity:isDone&&!won?.45:1}}>
                  {/* Nom condensé */}
                  <div style={{flex:1,minWidth:0}}>
                    {parts.map((p,i)=>(
                      <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:i<parts.length-1?2:0}}>
                        <div style={{width:3,height:'1em',background:match.server===pi+1&&isLive?pc:'transparent',borderRadius:2,flexShrink:0}}/>
                        <span style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:'clamp(12px,1.6vw,20px)',color:won?ac:tc,textTransform:'uppercase',letterSpacing:'1px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{won&&'🏆'} {p.n}</span>
                        {p.r&&<span style={{fontFamily:'var(--fb)',fontSize:'clamp(9px,1vw,12px)',color:ac,flexShrink:0}}>{p.r}</span>}
                      </div>
                    ))}
                    {parts[0]?.c&&<div style={{fontSize:'clamp(9px,.9vw,11px)',color:tc,opacity:.4,fontFamily:'var(--fb)',marginLeft:11}}>{parts[0].c}</div>}
                  </div>
                  {/* Score dans le jeu */}
                  {isLive&&isPointMode&&<div style={{minWidth:'clamp(32px,3.5vw,48px)',textAlign:'center',fontFamily:'var(--fd)',fontWeight:900,fontSize:'clamp(20px,2.8vw,38px)',color:pi===0?pc:ac,textShadow:`0 0 16px ${pi===0?pc:ac}88`,lineHeight:1,marginRight:12}}>{glTV(gs[pi])}</div>}
                  {/* Scores */}
                  {match.sets.map((st,i)=>{
                    const setDone=checkSetWon(st)||(isDone&&i===match.sets.length-1&&st[0]!==st[1]);
                    const w=setDone&&st[pi]>st[oi];
                    return(
                      <div key={i} style={{minWidth:36,textAlign:'center',fontFamily:'var(--fd)',fontWeight:w?900:400,fontSize:d.scoreFontSize,color:w?'#fff':tc,opacity:w?1:.35,textShadow:w?glow:'none',lineHeight:1}}>{st[pi]}</div>
                    );
                  })}
                  {/* Sets gagnés */}
                  <div style={{minWidth:44,textAlign:'center',fontFamily:'var(--fd)',fontWeight:900,fontSize:'clamp(28px,3.8vw,50px)',color:lead?ac:'rgba(255,255,255,.1)',textShadow:lead?`0 0 20px ${ac}cc`:'none',lineHeight:1}}>{sw[pi]}</div>
                </div>
              );
            })}
          </div>
          {/* Pied */}
          <div style={{padding:'8px 20px',display:'flex',gap:12,alignItems:'center',borderTop:`1px solid rgba(255,255,255,.06)`,background:d.headerBg}}>
            <span style={{fontFamily:'var(--fb)',fontSize:'clamp(9px,1vw,12px)',color:tc,opacity:.5,letterSpacing:1}}>{f.label}</span>
            {tbLabel&&<span style={{color:pc,fontWeight:700,fontSize:'clamp(10px,1.1vw,14px)',textShadow:glow}}>⚡ {tbLabel==='TB'?'TIE-BREAK':'SUPER TB'}</span>}
            {isDone&&<span style={{color:ac,fontWeight:700,fontSize:'clamp(11px,1.3vw,16px)',letterSpacing:2}}>{match.sets.map(s=>`${s[0]}-${s[1]}`).join('  ')}</span>}
            {dur&&<span style={{marginLeft:'auto',fontFamily:'var(--fd)',fontWeight:900,fontSize:'clamp(14px,1.8vw,24px)',color:ac,textShadow:`0 0 16px ${ac}88`}}>⏱ {dur}</span>}
          </div>
          <StatsPanel/>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════
    // LAYOUT : MODERN (Australian Open) — cartes colorées par joueur
    // ══════════════════════════════════════════════════════════════
    const colors=[pc,ac]; // p1=primary, p2=accent
    return(
      <div style={{...cardStyle,background:'transparent',border:'none',gap:0,display:'flex',flexDirection:'column'}}>
        <CardHeader/>
        <div style={{display:'flex',flexDirection:'column',gap:3}}>
          {[0,1].map(pi=>{
            const oi=1-pi,won=match.winner===pi+1,lead=sw[pi]>sw[oi];
            const pn=pi===0?match.player1:match.player2,pclub=pi===0?match.p1Club:match.p2Club,pr=pi===0?match.p1Ranking:match.p2Ranking;
            const parts=splitDouble(pn,pr,pclub);
            const col=colors[pi];
            return(
              <div key={pi} style={{
                background:isDone&&!won?'rgba(255,255,255,.04)':`linear-gradient(135deg,${col}22 0%,${col}0a 100%)`,
                border:`1px solid ${col}${won?'66':'22'}`,
                borderRadius:d.cardRadius,
                padding:'14px 20px',
                display:'flex',alignItems:'center',gap:14,
                opacity:isDone&&!won?.5:1,
                boxShadow:won?`inset 0 0 40px ${col}15, 0 2px 12px ${col}22`:'none',
              }}>
                {/* Indicateur serveur */}
                <div style={{width:4,height:40,background:match.server===pi+1&&isLive?col:'transparent',borderRadius:2,flexShrink:0,boxShadow:match.server===pi+1&&isLive?`0 0 12px ${col}`:'none'}}/>
                {/* Nom */}
                <div style={{flex:1}}>
                  {parts.map((p,i)=>(
                    <div key={i} style={{marginBottom:i<parts.length-1?4:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        {won&&i===0&&<span style={{fontSize:'clamp(14px,1.8vw,20px)'}}>🏆</span>}
                        <span style={{fontFamily:'var(--fd)',fontWeight:won?900:700,fontSize:d.nameFontSize,color:won?'#fff':tc}}>{p.n}</span>
                        {p.r&&<span style={{fontFamily:'var(--fb)',fontWeight:700,fontSize:'clamp(10px,1.2vw,14px)',color:col,background:`${col}22`,padding:'2px 8px',borderRadius:20}}>{p.r}</span>}
                      </div>
                      {p.c&&<div style={{fontFamily:'var(--fb)',fontSize:'clamp(9px,1vw,12px)',opacity:.5,color:tc,marginTop:2}}>{p.c}</div>}
                    </div>
                  ))}
                </div>
                {/* Scores */}
                <div style={{display:'flex',gap:10,alignItems:'center'}}>
                  {isLive&&isPointMode&&<div style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:'clamp(20px,2.8vw,38px)',color:col,textShadow:`0 0 16px ${col}88`,minWidth:'clamp(32px,3.5vw,48px)',textAlign:'center',lineHeight:1,marginRight:6}}>{glTV(gs[pi])}</div>}
                  {match.sets.map((st,i)=>{
                    const setDone=checkSetWon(st)||(isDone&&i===match.sets.length-1&&st[0]!==st[1]);
                    const w=setDone&&st[pi]>st[oi];
                    return(
                      <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',background:w?`${col}33`:'rgba(255,255,255,.05)',borderRadius:6,padding:'4px 10px',border:`1px solid ${w?col+'66':'rgba(255,255,255,.08)'}`}}>
                        <span style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:d.scoreFontSize,color:w?'#fff':tc,opacity:w?1:.45,lineHeight:1}}>{st[pi]}</span>
                      </div>
                    );
                  })}
                  {/* Sets gagnés */}
                  <div style={{background:lead?`${col}44`:'rgba(255,255,255,.05)',borderRadius:8,padding:'4px 12px',minWidth:44,textAlign:'center',border:`2px solid ${lead?col+'88':'transparent'}`}}>
                    <span style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:'clamp(22px,3vw,36px)',color:lead?'#fff':'rgba(255,255,255,.15)',lineHeight:1}}>{sw[pi]}</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        {/* Pied */}
        <div style={{padding:'8px 16px',display:'flex',gap:12,alignItems:'center',background:d.headerBg,borderTop:`1px solid rgba(255,255,255,.06)`,marginTop:3,borderRadius:`0 0 ${d.cardRadius}px ${d.cardRadius}px`}}>
          <span style={{fontFamily:'var(--fb)',fontSize:'clamp(9px,1vw,12px)',color:tc,opacity:.5}}>{f.label}</span>
          {tbLabel&&<span style={{color:pc,fontWeight:700,fontSize:'clamp(10px,1.2vw,14px)'}}>⚡ {tbLabel==='TB'?'TIE-BREAK':'SUPER TB'}</span>}
          {isDone&&<span style={{color:ac,fontWeight:700,fontSize:'clamp(11px,1.4vw,16px)',letterSpacing:1}}>{match.sets.map(s=>`${s[0]}-${s[1]}`).join('  ')}</span>}
          {dur&&<span style={{marginLeft:'auto',fontFamily:'var(--fd)',fontWeight:900,fontSize:'clamp(14px,1.8vw,22px)',color:ac}}>⏱ {dur}</span>}
        </div>
        <StatsPanel/>
      </div>
    );
  };

  const SBItem=({m})=>{
    const sw=countWonSets(m),isLive=m.status==='live',isDone=m.status==='finished',isPend=m.status==='pending';
    const dur2=m.startedAt&&m.endedAt?fmtDur(m.endedAt-m.startedAt):isLive?durs[m.id]||'':'';
    const nbSets=m.sets.length;

    if(isDone){
      // ── Tableau style scoreboard pour les matchs terminés
      return(
        <div style={{padding:'8px 10px 6px',borderBottom:`1px solid rgba(255,255,255,.08)`,borderLeft:`3px solid ${ac}`}}>
          {/* Header: heure + catégorie */}
          <div style={{display:'flex',gap:6,marginBottom:5,alignItems:'center'}}>
            {m.scheduledTime&&<span style={{fontSize:11,fontFamily:'var(--fb)',color:ac,fontWeight:600}}>{m.scheduledTime}</span>}
            <span style={{fontSize:10,opacity:.5,fontFamily:'var(--fb)',color:tc,textTransform:'uppercase',letterSpacing:.8}}>{m.category}{m.round&&` · ${m.round}`}</span>
            {dur2&&<span style={{fontSize:10,opacity:.45,fontFamily:'var(--fb)',color:tc,marginLeft:'auto'}}>⏱{dur2}</span>}
          </div>
          {/* Tableau scoreboard */}
          <table className="tv-sb-table">
            <tbody>
              {[0,1].map(pi=>{
                const won=m.winner===pi+1;
                return(
                  <tr key={pi} style={{background:won?`rgba(255,215,0,.08)`:'transparent'}}>
                    {/* Indicateur vainqueur */}
                    <td style={{width:14,paddingLeft:2,paddingRight:0}}>
                      {won&&<span style={{color:ac,fontSize:12,lineHeight:1}}>▶</span>}
                    </td>
                    {/* Nom */}
                    <td className="tv-sb-name" style={{color:won?ac:tc,opacity:won?1:.55,paddingLeft:4,maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',fontSize:12}}>
                      {pi===0?m.player1:m.player2}
                    </td>
                    {/* Scores par set */}
                    {m.sets.map((s,i)=>{
                      const setDone=checkSetWon(s)||(i===m.sets.length-1);
                      const setWon=s[pi]>s[1-pi]&&setDone;
                      return(
                        <td key={i} className="tv-sb-set"
                          style={{color:setWon?'#fff':tc,opacity:setWon?1:.4,fontWeight:setWon?900:600,background:setWon?`rgba(255,255,255,.06)`:'transparent',borderRadius:2}}>
                          {s[pi]}
                        </td>
                      );
                    })}
                    {/* Sets gagnés */}
                    <td className="tv-sb-won" style={{color:won?ac:'rgba(255,255,255,.25)',paddingLeft:4}}>
                      {sw[pi]}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }

    // ── Match en cours ou à venir
    return(
      <div style={{padding:'9px 12px',borderBottom:`1px solid rgba(255,255,255,.07)`,borderLeft:`3px solid ${isLive?pc:'transparent'}`,background:isLive?'rgba(255,255,255,.06)':'transparent'}}>
        <div style={{display:'flex',gap:6,marginBottom:4,alignItems:'center'}}>
          {isLive
            ?<span style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'#ff4444',fontWeight:700,letterSpacing:1}}><span className="dot" style={{width:6,height:6,background:'#ff4444'}}/>LIVE</span>
            :<span style={{fontSize:11,color:ac,fontWeight:600,fontFamily:'var(--fb)'}}>{m.scheduledTime||'À venir'}</span>
          }
          <span style={{fontSize:10,opacity:.4,fontFamily:'var(--fb)',color:tc,textTransform:'uppercase',letterSpacing:.5}}>{m.category}</span>
          {isLive&&dur2&&<span style={{fontSize:10,opacity:.45,fontFamily:'var(--fb)',color:tc,marginLeft:'auto'}}>⏱{dur2}</span>}
        </div>
        {[0,1].map(pi=>(
          <div key={pi} style={{display:'flex',alignItems:'center',gap:4,marginTop:pi===0?0:3}}>
            {isLive&&m.server===pi+1&&<span style={{width:6,height:6,borderRadius:'50%',background:pc,display:'inline-block',flexShrink:0,boxShadow:`0 0 6px ${pc}`}}/>}
            {!(isLive&&m.server===pi+1)&&<span style={{width:6,display:'inline-block'}}/>}
            <span style={{flex:1,fontSize:12,fontWeight:600,fontFamily:'var(--fd)',color:tc,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {pi===0?m.player1:m.player2}
            </span>
            {isLive&&m.sets.map((s,i)=>(
              <span key={i} style={{width:18,textAlign:'center',fontSize:13,fontWeight:700,color:i===m.sets.length-1?'#fff':tc,opacity:i===m.sets.length-1?1:.5}}>{s[pi]}</span>
            ))}
          </div>
        ))}
        {m.round&&<div style={{fontSize:10,opacity:.3,marginTop:4,fontFamily:'var(--fb)',color:tc,textTransform:'uppercase',letterSpacing:.5}}>{m.round}</div>}
        {m.round&&<div style={{fontSize:10,opacity:.3,marginTop:4,fontFamily:'var(--fb)',color:tc,textTransform:'uppercase',letterSpacing:.5}}>{m.round}</div>}
      </div>
    );
  };

  return(
    <div className="tv-wrap" style={{background:settings.bgImage?`url(${settings.bgImage}) center/cover no-repeat fixed`:bg,color:tc}}>
      <div style={{position:'fixed',inset:0,zIndex:0}}>
        <div style={{position:'absolute',inset:0,background:settings.bgImage?'rgba(0,0,0,.65)':bg}}/>
        {!settings.bgImage&&<div style={{position:'absolute',inset:0,background:d.pattern}}/>}
        <div style={{position:'absolute',inset:0,opacity:.025,backgroundImage:'repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.4)3px,rgba(255,255,255,.4)4px),repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,.04)60px,rgba(255,255,255,.04)61px)'}}/>
        <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,transparent 0%,${pc} 30%,${ac} 50%,${pc} 70%,transparent 100%)`}}/>
        <div style={{position:'absolute',bottom:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${pc}88,${ac}88,${pc}88,transparent)`,opacity:.8}}/>
      </div>
      <div className="tv-body">
        <div className="tv-hdr" style={{borderBottom:`3px solid ${pc}`,background:`linear-gradient(135deg, rgba(0,0,0,.7) 0%, rgba(0,0,0,.4) 100%)`}}>
          <div className="flex ai gap4">
            {settings.clubLogo&&<img src={settings.clubLogo} style={{height:64,objectFit:'contain',filter:'drop-shadow(0 0 10px rgba(255,255,255,.3))'}} alt="logo"/>}
            <div>
              <div style={{fontFamily:'var(--fb)',fontSize:11,letterSpacing:5,textTransform:'uppercase',color:pc,fontWeight:700,marginBottom:4,opacity:.9}}>{settings.clubName}</div>
              <div style={{fontFamily:'var(--fd)',fontSize:'clamp(28px,3.8vw,48px)',fontWeight:900,color:'#fff',letterSpacing:'-.5px',lineHeight:1,
                textShadow:`0 0 40px ${pc}, 0 2px 4px rgba(0,0,0,.5)`,
                WebkitTextStroke:'0.5px rgba(255,255,255,.15)'}}>{settings.tournamentName}</div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:20}}>
            {weather&&<div style={{textAlign:'center',padding:'0 20px',borderLeft:`1px solid rgba(255,255,255,.1)`,borderRight:`1px solid rgba(255,255,255,.1)`}}>
              <div style={{fontSize:'clamp(26px,3.8vw,44px)',lineHeight:1}}>{weather.emoji}</div>
              <div style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:'clamp(18px,2.5vw,30px)',color:'#fff',lineHeight:1.1}}>{weather.temp}°</div>
              <div style={{fontFamily:'var(--fb)',fontSize:'clamp(9px,1vw,12px)',color:tc,opacity:.65,marginTop:2}}>{weather.desc}</div>
              {settings.weatherCity&&<div style={{fontFamily:'var(--fb)',fontSize:'clamp(8px,.9vw,10px)',color:tc,opacity:.4}}>{settings.weatherCity}</div>}
            </div>}
            {settings.tvUrl&&<div style={{textAlign:'center'}}>
              <img src={'https://api.qrserver.com/v1/create-qr-code/?size=90x90&data='+encodeURIComponent(settings.tvUrl)+'&bgcolor=111111&color=ffffff&margin=4'}
                style={{width:'clamp(56px,6vw,90px)',height:'clamp(56px,6vw,90px)',borderRadius:6,opacity:.9}} alt="QR"/>
              <div style={{fontFamily:'var(--fb)',fontSize:'clamp(7px,.8vw,10px)',color:tc,opacity:.45,marginTop:2}}>Suivez en direct</div>
            </div>}
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:'var(--fd)',fontSize:'clamp(36px,5.5vw,60px)',fontWeight:900,letterSpacing:'-2px',fontVariantNumeric:'tabular-nums',
                color:'#fff',lineHeight:1,textShadow:`0 0 30px ${ac}cc, 0 2px 8px rgba(0,0,0,.6)`}}>{time.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
              <div style={{fontFamily:'var(--fb)',fontSize:13,marginTop:6,color:ac,letterSpacing:.5,fontWeight:600,opacity:.85}}>{time.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</div>
            </div>
          </div>
        </div>
        <div className="tv-content">
          <div className="tv-sidebar">
            <div className="tv-sb-label" style={{color:tc}}>Programme du jour</div>
            {todayM.length===0?<div style={{padding:'20px 14px',opacity:.4,fontSize:13,fontFamily:'var(--fb)',color:tc}}>Aucun match programmé</div>:todayM.map(m=><SBItem key={m.id} m={m}/>)}
          </div>
          <div className="tv-main">
            {live.length===0?(
              <div className="tv-empty" style={{color:tc}}><div style={{fontSize:72}}>🎾</div><div style={{fontFamily:'var(--fd)',fontSize:24,fontWeight:700}}>Aucun match en cours</div><div style={{fontFamily:'var(--fb)',fontSize:14}}>Les scores apparaîtront ici en temps réel</div></div>
            ):(
              <>
                {live.length>2&&<div style={{display:'flex',gap:6,justifyContent:'center',marginBottom:14}}>{Array.from({length:Math.ceil(live.length/2)}).map((_,i)=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:Math.floor(scrollIdx/2)===i?pc:'rgba(255,255,255,.2)',cursor:'pointer'}} onClick={()=>setScrollIdx(i*2)}/>)}</div>}
                <div className={`tv-live-grid ${displayed.length>1?'tv-live-2':'tv-live-1'}`}>{displayed.map(m=><TVMatch key={m.id} match={m}/>)}</div>
              </>
            )}
          </div>
        </div>
        {finishedToday.length>0&&finishedToday[palmIdx%finishedToday.length]?.winner&&(()=>{
          const m=finishedToday[palmIdx%finishedToday.length];
          const winner=m.winner===1?m.player1:m.player2;
          const loser=m.winner===1?m.player2:m.player1;
          const wRank=m.winner===1?m.p1Ranking:m.p2Ranking;
          return(
            <div style={{background:`linear-gradient(90deg,${pc}22,rgba(0,0,0,.5),${ac}11)`,borderTop:`1px solid ${pc}44`,padding:'7px 40px',display:'flex',alignItems:'center',gap:16,minHeight:40,flexShrink:0}}>
              <span style={{fontFamily:'var(--fb)',fontSize:'clamp(9px,1vw,11px)',letterSpacing:2,textTransform:'uppercase',color:pc,fontWeight:700,flexShrink:0}}>🏆 Palmarès</span>
              <div style={{width:1,height:18,background:'rgba(255,255,255,.15)',flexShrink:0}}/>
              {m.category&&<span style={{fontFamily:'var(--fb)',fontSize:'clamp(9px,1vw,12px)',color:tc,opacity:.55,flexShrink:0}}>{m.category}</span>}
              <span style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:'clamp(13px,1.6vw,20px)',color:ac,whiteSpace:'nowrap'}}>{winner}{wRank?` (${wRank})`:''}</span>
              <span style={{fontFamily:'var(--fb)',fontSize:'clamp(10px,1.1vw,13px)',color:tc,opacity:.55,flexShrink:0}}>bat</span>
              <span style={{fontFamily:'var(--fd)',fontWeight:600,fontSize:'clamp(12px,1.4vw,17px)',color:tc,opacity:.75,flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{loser}</span>
              <span style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:'clamp(12px,1.4vw,17px)',color:tc,opacity:.6,flexShrink:0}}>{scoreText(m)}</span>
              {finishedToday.length>1&&<div style={{display:'flex',gap:4,flexShrink:0}}>{finishedToday.map((_,i)=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:i===palmIdx%finishedToday.length?ac:'rgba(255,255,255,.2)'}}/>)}</div>}
            </div>
          );
        })()}
        <div className="tv-ftr">
          {settings.sponsors?.length>0&&<><span style={{fontSize:11,letterSpacing:2,textTransform:'uppercase',opacity:.4,fontFamily:'var(--fb)',color:tc,whiteSpace:'nowrap'}}>Partenaires</span><div style={{display:'flex',gap:20,alignItems:'center',overflow:'hidden'}}>{settings.sponsors.map((sp,i)=><div key={i} style={{opacity:i===sponsorIdx?.95:.4,transition:'opacity .5s',flexShrink:0}}>{sp.logo?<img src={sp.logo} alt={sp.name} style={{height:26,objectFit:'contain'}}/>:<span style={{fontFamily:'var(--fd)',fontSize:13,fontWeight:700,color:tc}}>{sp.name}</span>}</div>)}</div></>}
          {lastCmt&&<div style={{flex:1,overflow:'hidden',fontFamily:'var(--fb)',fontSize:13,opacity:.75,color:tc,whiteSpace:'nowrap',textOverflow:'ellipsis'}}>💬 {lastCmt.text}</div>}
          {isPublic&&<div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
            {user?<><input value={cmtIn} onChange={e=>setCmtIn(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&cmtIn.trim()){onComment(cmtIn);setCmtIn('');}}} placeholder="Votre commentaire…" style={{padding:'5px 10px',borderRadius:'var(--r)',border:'1px solid rgba(255,255,255,.2)',background:'rgba(255,255,255,.1)',color:tc,fontSize:13,width:180,fontFamily:'var(--fb)'}}/><button onClick={()=>{if(cmtIn.trim()){onComment(cmtIn);setCmtIn('');}}} style={{padding:'5px 10px',borderRadius:'var(--r)',background:pc,color:'#fff',border:'none',cursor:'pointer',fontSize:13}}>Envoyer</button></>
            :<button onClick={onGoogleLogin} style={{padding:'5px 12px',borderRadius:'var(--r)',background:'rgba(255,255,255,.1)',color:tc,border:'1px solid rgba(255,255,255,.2)',cursor:'pointer',fontSize:12}}>Se connecter pour commenter</button>}
          </div>}
        </div>
      </div>
    </div>
  );
}

// ── HistoryPage ──────────────────────────────────────────────────
// ── MatchStatsModal — stats complètes d'un match ─────────────────
function MatchStatsModal({match:m,onClose}){
  const st=computeServiceStats(m);
  const pt=computePointStats(m);
  const pct=(a,b)=>b>0?Math.round(a/b*100)+'%':'—';
  const nP=name=>{const caps=name.trim().split(' ').filter(w=>w.length>1&&w===w.toUpperCase());return caps.join(' ')||name.split(' ')[0];};
  const dur=m.startedAt&&m.endedAt?getMatchDur(m,m.endedAt):'';
  const Row=({label,v1,v2,bold})=>(
    <tr style={{borderBottom:'1px solid var(--bdr-l)'}}>
      <td style={{padding:'6px 8px',fontFamily:'var(--fb)',fontSize:13,color:'var(--txt-m)'}}>{label}</td>
      <td style={{padding:'6px 12px',textAlign:'center',fontFamily:'var(--fd)',fontWeight:bold?700:500,fontSize:14,color:bold?'var(--clay)':'var(--txt)'}}>{v1}</td>
      <td style={{padding:'6px 12px',textAlign:'center',fontFamily:'var(--fd)',fontWeight:bold?700:500,fontSize:14,color:bold?'var(--clay)':'var(--txt)'}}>{v2}</td>
    </tr>
  );
  const Sep=({label})=>(<tr><td colSpan={3} style={{padding:'8px 8px 4px',fontFamily:'var(--fb)',fontSize:11,color:'var(--txt-l)',textTransform:'uppercase',letterSpacing:1,background:'var(--sand-l)'}}>{label}</td></tr>);
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:560,maxHeight:'85vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div>
            <h2 style={{fontFamily:'var(--fd)',fontSize:18}}>📊 Stats du match</h2>
            <div style={{fontFamily:'var(--fb)',fontSize:13,color:'var(--txt-m)',marginTop:2}}>{m.category}{m.round?' · '+m.round:''}{dur?' · ⏱ '+dur:''}</div>
          </div>
          <button className="btn btn-sm" onClick={onClose}>✕</button>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'var(--clay)',color:'#fff'}}>
              <th style={{padding:'8px',textAlign:'left',fontFamily:'var(--fb)',fontSize:12,width:'45%'}}></th>
              <th style={{padding:'8px',textAlign:'center',fontFamily:'var(--fd)',fontWeight:700,fontSize:13}}>{nP(m.player1)}</th>
              <th style={{padding:'8px',textAlign:'center',fontFamily:'var(--fd)',fontWeight:700,fontSize:13}}>{nP(m.player2)}</th>
            </tr>
          </thead>
          <tbody>
            <Row label="Score" v1={m.sets.map(s=>s[0]).join('-')} v2={m.sets.map(s=>s[1]).join('-')}/>
            {st&&<>
              <Sep label="Service (jeux)"/>
              <Row label="Jeux service gagnés" v1={st[0].won} v2={st[1].won} bold/>
              <Row label="Jeux service perdus" v1={st[0].lost} v2={st[1].lost}/>
              <Row label="% jeux service" v1={pct(st[0].won,st[0].won+st[0].lost)} v2={pct(st[1].won,st[1].won+st[1].lost)}/>
              <Row label="Breaks gagnés" v1={st[1].lost} v2={st[0].lost} bold/>
            </>}
            {pt&&<>
              <Sep label="Points"/>
              <Row label="Total points" v1={pt.p1.totalPts} v2={pt.p2.totalPts}/>
              <Row label="Points gagnés" v1={pt.p1.totalWon} v2={pt.p2.totalWon} bold/>
              <Row label="% points" v1={pct(pt.p1.totalWon,pt.p1.totalPts)} v2={pct(pt.p2.totalWon,pt.p2.totalPts)}/>
              <Sep label="Service (points)"/>
              <Row label="% pts sur service" v1={pct(pt.p1.serveWon,pt.p1.servePts)} v2={pct(pt.p2.serveWon,pt.p2.servePts)}/>
              {(pt.p1.firstTotal+pt.p2.firstTotal>0)&&<>
                <Row label="1ère balle entrée" v1={pt.p1.firstTotal?pt.p1.firstIn+'/'+pt.p1.firstTotal:'—'} v2={pt.p2.firstTotal?pt.p2.firstIn+'/'+pt.p2.firstTotal:'—'}/>
                <Row label="% pts sur 1ère" v1={pct(pt.p1.firstWon,pt.p1.firstIn)} v2={pct(pt.p2.firstWon,pt.p2.firstIn)}/>
                <Row label="2ème balle entrée" v1={pt.p1.secondTotal?pt.p1.secondIn+'/'+pt.p1.secondTotal:'—'} v2={pt.p2.secondTotal?pt.p2.secondIn+'/'+pt.p2.secondTotal:'—'}/>
                <Row label="% pts sur 2ème" v1={pct(pt.p1.secondWon,pt.p1.secondIn)} v2={pct(pt.p2.secondWon,pt.p2.secondIn)}/>
              </>}
              {(pt.p1.aces+pt.p2.aces+pt.p1.dfs+pt.p2.dfs>0)&&<>
                <Row label="Aces" v1={pt.p1.aces} v2={pt.p2.aces} bold/>
                <Row label="Double fautes" v1={pt.p1.dfs} v2={pt.p2.dfs}/>
              </>}
              <Sep label="Retour"/>
              <Row label="% pts en retour" v1={pct(pt.p1.returnWon,pt.p1.returnPts)} v2={pct(pt.p2.returnWon,pt.p2.returnPts)}/>
              {(pt.p1.winners+pt.p2.winners+pt.p1.errors+pt.p2.errors>0)&&<>
                <Sep label="Coups"/>
                <Row label="Pts gagnants" v1={pt.p1.winners} v2={pt.p2.winners} bold/>
                <Row label="Fautes directes" v1={pt.p1.errors} v2={pt.p2.errors}/>
              </>}
              <Sep label="Break points"/>
              <Row label="BP convertis" v1={pt.p1.bpConv+'/'+pt.p1.bpOpp} v2={pt.p2.bpConv+'/'+pt.p2.bpOpp} bold/>
              <Row label="BP sauvées" v1={pt.p1.bpSaved+'/'+pt.p1.bpFaced} v2={pt.p2.bpSaved+'/'+pt.p2.bpFaced}/>
              <Row label="% BP convertis" v1={pct(pt.p1.bpConv,pt.p1.bpOpp)} v2={pct(pt.p2.bpConv,pt.p2.bpOpp)}/>
              <Row label="% BP sauvées" v1={pct(pt.p1.bpSaved,pt.p1.bpFaced)} v2={pct(pt.p2.bpSaved,pt.p2.bpFaced)}/>
            </>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── StatsTab ─────────────────────────────────────────────────────
// ── StatsTab ─────────────────────────────────────────────────────
function StatsTab({matches,settings}){
  const done=matches.filter(m=>m.status==='finished'&&m.winner);
  const [selPlayer,setSelPlayer]=useState('');
  const [selStats,setSelStats]=useState(null);

  const allPlayers=useMemo(()=>{
    const names=new Set();
    matches.forEach(m=>{
      if(m.status==='finished'||m.status==='live'||m.status==='paused'){
        m.player1.split(' / ').forEach(p=>names.add(p.trim()));
        m.player2.split(' / ').forEach(p=>names.add(p.trim()));
      }
    });
    return [...names].sort((a,b)=>a.localeCompare(b,'fr'));
  },[matches]);

  const durMs=m=>m.startedAt&&m.endedAt?m.endedAt-m.startedAt-(m.totalPausedMs||0):0;
  const nP=name=>name.split(' / ').map(p=>{const words=p.trim().split(' ');const caps=words.filter(w=>w.length>1&&w===w.toUpperCase());return caps.join(' ')||words[0];}).join(' / ');
  const getWinner=m=>m.winner===1?m.player1:m.player2;
  const getLoser=m=>m.winner===1?m.player2:m.player1;
  const getWRank=m=>m.winner===1?m.p1Ranking:m.p2Ranking;
  const getLRank=m=>m.winner===1?m.p2Ranking:m.p1Ranking;

  if(done.length===0&&!selPlayer)return(
    <div style={{padding:24}}><div className="card" style={{textAlign:'center',padding:48,color:'var(--txt-m)'}}>
      <div style={{fontSize:40,marginBottom:12}}>📊</div>
      <h3>Aucun match terminé pour l'instant</h3>
    </div></div>
  );

  const cats=[...new Set(done.map(m=>m.category||'Divers'))].sort();
  const longest=done.length?done.reduce((a,b)=>durMs(a)>durMs(b)?a:b):null;
  const fastest=done.filter(m=>durMs(m)>60000).length?done.filter(m=>durMs(m)>60000).reduce((a,b)=>durMs(a)<durMs(b)?a:b):null;
  const mostGames=done.length?done.reduce((a,b)=>a.sets.flat().reduce((x,y)=>x+y,0)>b.sets.flat().reduce((x,y)=>x+y,0)?a:b):null;
  const wins={};done.forEach(m=>{const w=getWinner(m);wins[w]=(wins[w]||0)+1;});
  const topWins=Object.entries(wins).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const games={};done.forEach(m=>{const p1g=m.sets.reduce((a,s)=>a+s[0],0),p2g=m.sets.reduce((a,s)=>a+s[1],0);games[m.player1]=(games[m.player1]||0)+p1g;games[m.player2]=(games[m.player2]||0)+p2g;});
  const topGames=Object.entries(games).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const catStats=cats.map(cat=>{const ms=done.filter(m=>(m.category||'Divers')===cat);const long=ms.reduce((a,b)=>durMs(a)>durMs(b)?a:b);const fast=ms.filter(m=>durMs(m)>60000).length?ms.filter(m=>durMs(m)>60000).reduce((a,b)=>durMs(a)<durMs(b)?a:b):null;return{cat,count:ms.length,long,fast};});

  const StatCard=({icon,label,value,sub})=>(<div className="card" style={{flex:1,minWidth:200}}><div style={{fontSize:28,marginBottom:6}}>{icon}</div><div style={{fontFamily:'var(--fb)',fontSize:12,color:'var(--txt-l)',textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>{label}</div><div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:14,color:'var(--txt)',lineHeight:1.3}}>{value}</div>{sub&&<div style={{fontFamily:'var(--fb)',fontSize:12,color:'var(--txt-m)',marginTop:4}}>{sub}</div>}</div>);
  const MatchLine=({m,label})=>(<div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid var(--bdr-l)'}}><span style={{fontSize:11,color:'var(--txt-l)',fontFamily:'var(--fb)',minWidth:64,flexShrink:0}}>{label}</span><div style={{flex:1,fontSize:13,fontFamily:'var(--fd)'}}><span style={{fontWeight:700,color:'var(--clay)'}}>{nP(getWinner(m))}</span>{getWRank(m)&&<span style={{fontSize:11,color:'var(--txt-l)',marginLeft:4}}>{getWRank(m)}</span>}<span style={{fontFamily:'var(--fb)',fontSize:12,color:'var(--txt-l)',margin:'0 6px'}}>bat</span><span>{nP(getLoser(m))}</span>{getLRank(m)&&<span style={{fontSize:11,color:'var(--txt-l)',marginLeft:4}}>{getLRank(m)}</span>}<span style={{color:'var(--txt-l)',marginLeft:6,fontSize:12}}>{scoreText(m)}</span></div>{durMs(m)>0&&<span style={{fontFamily:'var(--fb)',fontSize:12,color:'var(--clay)',fontWeight:600,flexShrink:0}}>⏱ {fmtDur(durMs(m))}</span>}</div>);

  return(
    <div style={{padding:24,maxWidth:920,margin:'0 auto'}}>
      <h2 style={{marginBottom:20,fontFamily:'var(--fd)'}}>📊 Statistiques du tournoi</h2>

      {/* Parcours joueur */}
      <div className="card mb4">
        <h3 style={{marginBottom:12,fontFamily:'var(--fd)',fontSize:15}}>🔍 Parcours d'un joueur</h3>
        <div style={{position:'relative'}}>
          <input className="inp" placeholder="Rechercher un joueur..." value={selPlayer}
            onChange={e=>setSelPlayer(e.target.value)}
            style={{paddingRight:selPlayer?36:12}}/>
          {selPlayer&&<button onClick={()=>setSelPlayer('')} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:16,color:'var(--txt-l)',lineHeight:1}}>✕</button>}
        </div>
        {selPlayer.trim().length>0&&(()=>{
          const q=selPlayer.trim().toLowerCase();
          const filtered=allPlayers.filter(p=>p.toLowerCase().includes(q));
          if(!filtered.length)return <p style={{color:'var(--txt-m)',fontSize:13,marginTop:8}}>Aucun joueur trouvé.</p>;
          // Si correspondance exacte → afficher le parcours
          const exact=filtered.length===1?filtered[0]:allPlayers.find(p=>p.toLowerCase()===q);
          if(exact){
            const inMatch=m=>m.player1.split(' / ').map(p=>p.trim()).includes(exact)||m.player2.split(' / ').map(p=>p.trim()).includes(exact);
            const isP1=m=>m.player1.split(' / ').map(p=>p.trim()).includes(exact);
            const pms=matches.filter(m=>inMatch(m)&&(m.status==='finished'||m.status==='live'||m.status==='paused'))
              .sort((a,b)=>(a.date||'').localeCompare(b.date||'')||timeToMin(a.scheduledTime)-timeToMin(b.scheduledTime));
            const pw=pms.filter(m=>m.status==='finished'&&((isP1(m)&&m.winner===1)||(!isP1(m)&&m.winner===2))).length;
            const pl=pms.filter(m=>m.status==='finished'&&((isP1(m)&&m.winner===2)||(!isP1(m)&&m.winner===1))).length;
            const info=(settings?.players||[]).find(p=>p.name===exact)||matches.reduce((found,m)=>{
              if(found)return found;
              if(m.player1.split(' / ').map(p=>p.trim()).includes(exact))return{ranking:m.p1Ranking,club:m.p1Club};
              if(m.player2.split(' / ').map(p=>p.trim()).includes(exact))return{ranking:m.p2Ranking,club:m.p2Club};
              return null;
            },null);
            if(!pms.length)return <p style={{color:'var(--txt-m)',fontSize:13,marginTop:8}}>Aucun match trouvé pour <strong>{exact}</strong>.</p>;
            return(
              <div style={{marginTop:16}}>
                <div style={{display:'flex',alignItems:'center',gap:16,padding:'12px 0',borderBottom:'2px solid var(--clay)',marginBottom:12}}>
                  <div style={{width:48,height:48,borderRadius:'50%',background:'var(--clay)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontFamily:'var(--fd)',fontWeight:900,fontSize:22,flexShrink:0}}>
                    {(exact.trim().split(' ').find(w=>w===w.toUpperCase()&&w.length>1)||exact)[0]}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:18}}>{exact}</div>
                    <div style={{fontFamily:'var(--fb)',fontSize:13,color:'var(--txt-m)',marginTop:2,display:'flex',gap:8}}>
                      {info?.ranking&&<span style={{background:'var(--sand)',border:'1px solid var(--bdr)',borderRadius:4,padding:'1px 8px'}}>{info.ranking}</span>}
                      {info?.club&&<span style={{opacity:.7}}>{info.club}</span>}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:20,textAlign:'center'}}>
                    <div><div style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:28,color:'var(--green)'}}>{pw}</div><div style={{fontFamily:'var(--fb)',fontSize:11,color:'var(--txt-l)'}}>Victoires</div></div>
                    <div><div style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:28,color:'var(--red)'}}>{pl}</div><div style={{fontFamily:'var(--fb)',fontSize:11,color:'var(--txt-l)'}}>Défaites</div></div>
                    <div><div style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:28,color:'var(--clay)'}}>{pms.length}</div><div style={{fontFamily:'var(--fb)',fontSize:11,color:'var(--txt-l)'}}>Matchs</div></div>
                  </div>
                </div>
                {pms.map(m=>{
                  const myIsP1=isP1(m);
                  const myWin=m.status==='finished'&&((myIsP1&&m.winner===1)||(!myIsP1&&m.winner===2));
                  const opponent=myIsP1?m.player2:m.player1;
                  const oppRank=myIsP1?m.p2Ranking:m.p1Ranking;
                  const isLive=m.status==='live'||m.status==='paused';
                  return(
                    <div key={m.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--bdr-l)'}}>
                      <span className={`badge ${myWin?'b-done':isLive?'b-live':m.status==='finished'?'b-red':'b-pend'}`} style={{minWidth:28,textAlign:'center',fontSize:11,fontWeight:700}}>
                        {isLive?'▶':myWin?'V':'D'}
                      </span>
                      <div style={{flex:1}}>
                        <div style={{fontFamily:'var(--fd)',fontWeight:600,fontSize:13,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                          <span>vs {nP(opponent)}</span>
                          {oppRank&&<span style={{fontSize:11,color:'var(--txt-l)',fontFamily:'var(--fb)'}}>{oppRank}</span>}
                          {m.wo&&<span style={{fontSize:10,color:'#b87000',fontFamily:'var(--fb)',background:'rgba(184,112,0,.1)',padding:'1px 6px',borderRadius:3}}>W.O.</span>}
                          {m.abandonBy&&<span style={{fontSize:10,color:'var(--red)',fontFamily:'var(--fb)',background:'rgba(200,40,40,.1)',padding:'1px 6px',borderRadius:3}}>Abandon</span>}
                        </div>
                        <div style={{fontFamily:'var(--fb)',fontSize:11,color:'var(--txt-l)',marginTop:1}}>
                          {m.category&&<span>{m.category}</span>}{m.round&&<span> · {m.round}</span>}{m.date&&<span> · {m.date}</span>}
                        </div>
                      </div>
                      <span style={{fontFamily:'var(--fd)',fontWeight:600,fontSize:13,color:'var(--txt-m)'}}>{scoreText(m)}</span>
                      {durMs(m)>0&&<span style={{fontFamily:'var(--fb)',fontSize:11,color:'var(--txt-l)',flexShrink:0}}>⏱ {fmtDur(durMs(m))}</span>}
                      {(computeServiceStats(m)||computePointStats(m))&&<button className="btn btn-sm" style={{fontSize:11,padding:'3px 8px',marginLeft:4}} onClick={()=>setSelStats(m)}>📊</button>}
                    </div>
                  );
                })}
              </div>
            );
          }
          // Plusieurs résultats → liste cliquable
          return(
            <div style={{marginTop:8,border:'1px solid var(--bdr-l)',borderRadius:'var(--r)',overflow:'hidden'}}>
              {filtered.slice(0,10).map(p=>(
                <div key={p} onClick={()=>setSelPlayer(p)}
                  style={{padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid var(--bdr-l)',fontFamily:'var(--fd)',fontWeight:600,fontSize:14,display:'flex',alignItems:'center',gap:8}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--sand-l)'}
                  onMouseLeave={e=>e.currentTarget.style.background=''}>
                  <span style={{flex:1}}>{p}</span>
                  <span style={{fontSize:12,color:'var(--txt-l)',fontFamily:'var(--fb)'}}>→</span>
                </div>
              ))}
              {filtered.length>10&&<div style={{padding:'8px 14px',fontSize:12,color:'var(--txt-l)',fontFamily:'var(--fb)',textAlign:'center'}}>{filtered.length-10} autres résultats — affinez la recherche</div>}
            </div>
          );
        })()}
      </div>


      {/* Records globaux */}
      {done.length>0&&(()=>{
        // ── Records match ────────────────────────────────────────
        const fewestGames=done.reduce((a,b)=>a.sets.flat().reduce((x,y)=>x+y,0)<b.sets.flat().reduce((x,y)=>x+y,0)?a:b);
        const mostTBs=done.reduce((a,b)=>{const ta=a.sets.filter(s=>s[0]===7||s[1]===7||s[0]===10||s[1]===10).length;const tb=b.sets.filter(s=>s[0]===7||s[1]===7||s[0]===10||s[1]===10).length;return ta>tb?a:b;});
        const biggestComebackMatch=done.find(m=>m.history?.some&&m.sets.length>1&&((m.winner===1&&m.sets[0][0]<m.sets[0][1])||(m.winner===2&&m.sets[0][1]<m.sets[0][0])));

        // ── Records joueurs ──────────────────────────────────────
        const matchCount={};done.forEach(m=>{[m.player1,m.player2].forEach(p=>{matchCount[p]=(matchCount[p]||0)+1;});});
        const topMatches=Object.entries(matchCount).sort((a,b)=>b[1]-a[1]).slice(0,5);

        const timeOnCourt={};done.filter(m=>durMs(m)>0).forEach(m=>{[m.player1,m.player2].forEach(p=>{timeOnCourt[p]=(timeOnCourt[p]||0)+durMs(m);});});
        const topTime=Object.entries(timeOnCourt).sort((a,b)=>b[1]-a[1]).slice(0,3);

        // Ratio V/D (min 3 matchs)
        const ratios={};done.forEach(m=>{if(!ratios[m.player1])ratios[m.player1]={w:0,l:0};if(!ratios[m.player2])ratios[m.player2]={w:0,l:0};const w=m.winner===1?m.player1:m.player2,l=m.winner===1?m.player2:m.player1;ratios[w].w++;ratios[l].l++;});
        const topRatio=Object.entries(ratios).filter(([,r])=>r.w+r.l>=3).map(([n,r])=>[n,r,Math.round(r.w/(r.w+r.l)*100)]).sort((a,b)=>b[2]-a[2]).slice(0,3);

        // Victoires consécutives
        const playerList=[...new Set(done.flatMap(m=>[m.player1,m.player2]))];
        const topStreak=playerList.map(p=>{
          const pms=done.filter(m=>m.player1===p||m.player2===p).sort((a,b)=>(a.date||'').localeCompare(b.date||'')||timeToMin(a.scheduledTime)-timeToMin(b.scheduledTime));
          let max=0,cur=0;
          pms.forEach(m=>{const won=(m.winner===1&&m.player1===p)||(m.winner===2&&m.player2===p);if(won)cur++;else cur=0;max=Math.max(max,cur);});
          return[p,max];
        }).filter(([,n])=>n>=2).sort((a,b)=>b[1]-a[1]).slice(0,3);

        // ── Records stats points ─────────────────────────────────
        const ptMatches=done.filter(m=>m.pointLog?.length>5);
        const bestServe=ptMatches.flatMap(m=>{const pt=computePointStats(m);if(!pt)return[];return[[m.player1,pt.p1,m],[m.player2,pt.p2,m]];}).filter(([,p])=>p.servePts>=8).map(([n,p,m])=>[n,Math.round(p.serveWon/p.servePts*100),m]).sort((a,b)=>b[1]-a[1])[0];
        const bestReturn=ptMatches.flatMap(m=>{const pt=computePointStats(m);if(!pt)return[];return[[m.player1,pt.p1,m],[m.player2,pt.p2,m]];}).filter(([,p])=>p.returnPts>=8).map(([n,p,m])=>[n,Math.round(p.returnWon/p.returnPts*100),m]).sort((a,b)=>b[1]-a[1])[0];
        const mostAces=ptMatches.flatMap(m=>{const pt=computePointStats(m);if(!pt)return[];return[[m.player1,pt.p1.aces,m],[m.player2,pt.p2.aces,m]];}).filter(([,n])=>n>0).sort((a,b)=>b[1]-a[1])[0];
        const mostDF=ptMatches.flatMap(m=>{const pt=computePointStats(m);if(!pt)return[];return[[m.player1,pt.p1.dfs,m],[m.player2,pt.p2.dfs,m]];}).filter(([,n])=>n>0).sort((a,b)=>b[1]-a[1])[0];
        const bestBP=ptMatches.flatMap(m=>{const pt=computePointStats(m);if(!pt)return[];return[[m.player1,pt.p1,m],[m.player2,pt.p2,m]];}).filter(([,p])=>p.bpOpp>=2).map(([n,p,m])=>[n,Math.round(p.bpConv/p.bpOpp*100),p.bpConv,p.bpOpp,m]).sort((a,b)=>b[1]-a[1])[0];

        const Rank=({data,label,icon,fmt})=>data.length>0&&(
          <div className="card"><h4 style={{marginBottom:12,fontFamily:'var(--fd)',fontSize:14}}>{icon} {label}</h4>
            {data.map(([name,val],i)=>(<div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:'1px solid var(--bdr-l)'}}>
              <span style={{fontSize:16,minWidth:24}}>{['🥇','🥈','🥉'][i]||'•'}</span>
              <span style={{flex:1,fontFamily:'var(--fd)',fontWeight:600,fontSize:13}}>{nP(name)}</span>
              <span style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:16,color:'var(--clay)'}}>{fmt?fmt(val):val}</span>
            </div>))}
          </div>
        );

        return(<>
          <h3 style={{marginBottom:12,fontFamily:'var(--fd)',fontSize:15,color:'var(--txt-m)',textTransform:'uppercase',letterSpacing:1}}>Records de match</h3>
          <div style={{display:'flex',gap:12,flexWrap:'wrap',marginBottom:24}}>
            {longest&&<StatCard icon="⏱" label="Match le plus long" value={nP(getWinner(longest))+' bat '+nP(getLoser(longest))} sub={scoreText(longest)+' — '+fmtDur(durMs(longest))+(longest.category?' · '+longest.category:'')}/>}
            {fastest&&<StatCard icon="⚡" label="Match le plus rapide" value={nP(getWinner(fastest))+' bat '+nP(getLoser(fastest))} sub={scoreText(fastest)+' — '+fmtDur(durMs(fastest))+(fastest.category?' · '+fastest.category:'')}/>}
            {mostGames&&<StatCard icon="🎾" label="Plus de jeux" value={nP(getWinner(mostGames))+' bat '+nP(getLoser(mostGames))} sub={scoreText(mostGames)+' — '+mostGames.sets.flat().reduce((a,b)=>a+b,0)+' jeux'+(mostGames.category?' · '+mostGames.category:'')}/>}
            <StatCard icon="🏃" label="Moins de jeux" value={nP(getWinner(fewestGames))+' bat '+nP(getLoser(fewestGames))} sub={scoreText(fewestGames)+' — '+fewestGames.sets.flat().reduce((a,b)=>a+b,0)+' jeux'+(fewestGames.category?' · '+fewestGames.category:'')}/>
            {mostTBs.sets.filter(s=>s[0]===7||s[1]===7||s[0]===10||s[1]===10).length>0&&<StatCard icon="⚡" label="Plus de tie-breaks" value={nP(getWinner(mostTBs))+' bat '+nP(getLoser(mostTBs))} sub={scoreText(mostTBs)+' — '+mostTBs.sets.filter(s=>s[0]===7||s[1]===7||s[0]===10||s[1]===10).length+' TB'+(mostTBs.category?' · '+mostTBs.category:'')}/>}
            {biggestComebackMatch&&<StatCard icon="🔄" label="Remontée" value={nP(getWinner(biggestComebackMatch))+' bat '+nP(getLoser(biggestComebackMatch))} sub={scoreText(biggestComebackMatch)+(biggestComebackMatch.category?' · '+biggestComebackMatch.category:'')}/>}
          </div>

          <h3 style={{marginBottom:12,fontFamily:'var(--fd)',fontSize:15,color:'var(--txt-m)',textTransform:'uppercase',letterSpacing:1}}>Records joueurs</h3>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:16,marginBottom:24}}>
            <Rank data={topWins} label="Plus de victoires" icon="🏆"/>
            <Rank data={topMatches} label="Plus de matchs joués" icon="🎾"/>
            {topStreak.length>0&&<Rank data={topStreak} label="Série de victoires" icon="🔥" fmt={n=>n+' consécutives'}/>}
            {topRatio.length>0&&<Rank data={topRatio.map(([n,,r])=>[n,r])} label="Meilleur ratio V/D" icon="📈" fmt={n=>n+'%'}/>}
            {topTime.length>0&&<Rank data={topTime.map(([n,t])=>[n,t])} label="Temps sur le court" icon="⏱" fmt={t=>fmtDur(t)}/>}
            <Rank data={topGames} label="Plus de jeux gagnés" icon="🎯"/>
          </div>

          {ptMatches.length>0&&<>
            <h3 style={{marginBottom:12,fontFamily:'var(--fd)',fontSize:15,color:'var(--txt-m)',textTransform:'uppercase',letterSpacing:1}}>Records stats (mode point)</h3>
            <div style={{display:'flex',gap:12,flexWrap:'wrap',marginBottom:24}}>
              {bestServe&&<StatCard icon="💪" label="Meilleur % service" value={nP(bestServe[0])+' — '+bestServe[1]+'%'} sub={scoreText(bestServe[2])+(bestServe[2].category?' · '+bestServe[2].category:'')}/>}
              {bestReturn&&<StatCard icon="↩" label="Meilleur % retour" value={nP(bestReturn[0])+' — '+bestReturn[1]+'%'} sub={scoreText(bestReturn[2])+(bestReturn[2].category?' · '+bestReturn[2].category:'')}/>}
              {mostAces&&<StatCard icon="⚡" label="Plus d'aces" value={nP(mostAces[0])+' — '+mostAces[1]+' ace'+(mostAces[1]>1?'s':'')} sub={scoreText(mostAces[2])+(mostAces[2].category?' · '+mostAces[2].category:'')}/>}
              {mostDF&&<StatCard icon="💥" label="Plus de double fautes" value={nP(mostDF[0])+' — '+mostDF[1]+' DF'} sub={scoreText(mostDF[2])+(mostDF[2].category?' · '+mostDF[2].category:'')}/>}
              {bestBP&&<StatCard icon="🔴" label="Meilleur % BP convertis" value={nP(bestBP[0])+' — '+bestBP[2]+'/'+bestBP[3]+' ('+bestBP[1]+'%)'} sub={scoreText(bestBP[4])+(bestBP[4].category?' · '+bestBP[4].category:'')}/>}
            </div>
          </>}

          <h3 style={{marginBottom:12,fontFamily:'var(--fd)',fontSize:15,color:'var(--txt-m)',textTransform:'uppercase',letterSpacing:1}}>Par tableau</h3>
          {catStats.map(({cat,count,long,fast})=>(
            <div key={cat} className="card mb3">
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                <h4 style={{fontFamily:'var(--fd)',fontSize:15}}>{cat}</h4>
                <span style={{fontFamily:'var(--fb)',fontSize:12,color:'var(--txt-l)'}}>{count} match{count>1?'s':''}</span>
              </div>
              <MatchLine m={long} label="⏱ + long"/>
              {fast&&fast.id!==long.id&&<MatchLine m={fast} label="⚡ + rapide"/>}
            </div>
          ))}
        </>);
      })()}
      {selStats&&<MatchStatsModal match={selStats} onClose={()=>setSelStats(null)}/>}
    </div>
  );
}

function HistoryPage({data,comments,user,onComment,onGoogleLogin}){
  const {matches,settings}=data;
  const [sel,setSel]=useState(todayStr());
  const [fbTxt,setFbTxt]=useState('');
  const [statsMatch,setStatsMatch]=useState(null);
  const allDates=useMemo(()=>{const ds=[...new Set(matches.map(m=>m.date).filter(Boolean))].sort().reverse();if(!ds.includes(todayStr()))ds.unshift(todayStr());return ds;},[matches]);
  const dayM=useMemo(()=>matches.filter(m=>m.date===sel).sort((a,b)=>timeToMin(a.scheduledTime)-timeToMin(b.scheduledTime)),[matches,sel]);
  const dayCmts=useMemo(()=>(comments||[]).filter(c=>c.date===sel),[comments,sel]);
  // Convertit en caractères gras Unicode (fonctionne sur Facebook)
  const toBold=s=>s.replace(/[A-Za-zÀ-ÿ0-9]/g,c=>{
    const code=c.charCodeAt(0);
    if(code>=65&&code<=90)return String.fromCodePoint(code+0x1D400-0x41);
    if(code>=97&&code<=122)return String.fromCodePoint(code+0x1D41A-0x61);
    if(code>=48&&code<=57)return String.fromCodePoint(code+0x1D7CE-0x30);
    return c;
  });

  const genFB=()=>{
    const lines=[`🎾 Résultats – ${fmtDateFR(sel)}`,`${settings.clubName} · ${settings.tournamentName}`,''];
    const fin=dayM.filter(m=>m.status==='finished');
    const grp={};fin.forEach(m=>{const k=m.category||'Divers';(grp[k]=grp[k]||[]).push(m);});
    Object.entries(grp).forEach(([cat,ms])=>{
      lines.push(`📌 ${cat}`);
      ms.forEach(m=>{
        const winner=m.winner===1?m.player1:m.player2,loser=m.winner===1?m.player2:m.player1;
        const wRank=m.winner===1?m.p1Ranking:m.p2Ranking;
        const wClub=m.winner===1?m.p1Club:m.p2Club;
        const lRank=m.winner===1?m.p2Ranking:m.p1Ranking;
        const lClub=m.winner===1?m.p2Club:m.p1Club;
        const wInfo=[wRank,wClub].filter(Boolean).join(' - ');
        const lInfo=[lRank,lClub].filter(Boolean).join(' - ');
        const winnerDisplay=`${toBold(winner)}${wInfo?` (${wInfo})`:''}`;
        const loserDisplay=`${loser}${lInfo?` (${lInfo})`:''}`;
        const dur=m.startedAt&&m.endedAt?` (${getMatchDur(m,m.endedAt)})`:'';
        const suffix=m.wo?' [W.O.]':m.abandonBy?` [Abandon ${m.abandonBy===1?m.player1:m.player2}]`:'';
        lines.push(`✅ ${winnerDisplay} bat ${loserDisplay} : ${scoreText(m)}${suffix}${dur}`);
      });
      lines.push('');
    });
    lines.push(`#tennis #${settings.clubName.replace(/\s/g,'')} #tournoi`);
    return lines.join('\n');
  };
  return(
    <div className="hist-wrap">
      <div className="flex ai jb mb4" style={{flexWrap:'wrap',gap:12}}>
        <h1>Résultats &amp; Historique</h1>
        <div className="flex gap2">
          <button className="btn" onClick={()=>{
            const fin=data.matches.filter(m=>m.status==='finished');
            if(!fin.length)return alert('Aucun match terminé.');
            const cats=[...new Set(fin.map(m=>m.category||'Divers'))].sort();
            const dur=m=>m.startedAt&&m.endedAt?fmtDur(m.endedAt-m.startedAt-(m.totalPausedMs||0)):'';
            const rows=cats.map(cat=>{
              const ms=fin.filter(m=>(m.category||'Divers')===cat).sort((a,b)=>timeToMin(a.scheduledTime)-timeToMin(b.scheduledTime));
              const lines=ms.map(m=>{
                const w=m.winner===1?m.player1:m.player2,l=m.winner===1?m.player2:m.player1;
                const wr=m.winner===1?m.p1Ranking:m.p2Ranking,lr=m.winner===1?m.p2Ranking:m.p1Ranking;
                return `<tr><td style="padding:6px 8px;font-weight:700;color:#c45c26">${w}${wr?` <small style="color:#666">${wr}</small>`:''}</td><td style="padding:6px 8px;color:#666;font-size:12px">bat</td><td style="padding:6px 8px">${l}${lr?` <small style="color:#666">${lr}</small>`:''}</td><td style="padding:6px 8px;font-weight:600">${scoreText(m)}</td><td style="padding:6px 8px;color:#666;font-size:12px">${m.round||''}</td><td style="padding:6px 8px;color:#666;font-size:12px">${dur(m)}</td></tr>`;
              }).join('');
              return `<div style="margin-bottom:24px"><h3 style="background:#c45c26;color:#fff;padding:8px 12px;margin:0 0 0 0;font-size:14px">${cat}</h3><table style="width:100%;border-collapse:collapse;font-size:13px;font-family:sans-serif"><thead><tr style="background:#f5e8d5"><th style="padding:5px 8px;text-align:left">Vainqueur</th><th></th><th style="padding:5px 8px;text-align:left">Perdant</th><th style="padding:5px 8px;text-align:left">Score</th><th style="padding:5px 8px;text-align:left">Tour</th><th style="padding:5px 8px;text-align:left">Durée</th></tr></thead><tbody>${lines}</tbody></table></div>`;
            }).join('');
            const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Résultats ${data.settings.tournamentName}</title><style>body{font-family:sans-serif;padding:20px;color:#222}h1{color:#c45c26;border-bottom:3px solid #c45c26;padding-bottom:8px}table tr:nth-child(even){background:#fafafa}@media print{.no-print{display:none}}</style></head><body><h1>${data.settings.tournamentName}</h1><p style="color:#666;margin-bottom:20px">${data.settings.clubName} — ${new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>${rows}</body></html>`;
            const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);
          }}>📄 Export PDF</button>
          <button className="btn btn-p" onClick={()=>setFbTxt(genFB())}>📘 Résumé Facebook</button>
        </div>
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:24}}>
        {allDates.map(d=><button key={d} onClick={()=>setSel(d)} style={{padding:'6px 14px',borderRadius:20,border:'1px solid var(--bdr)',background:d===sel?'var(--clay)':'var(--white)',color:d===sel?'#fff':'var(--txt)',fontSize:13,cursor:'pointer',transition:'all .15s'}}>{d===todayStr()?"Aujourd'hui":fmtDateFR(d).replace(/^\w+,?\s*/,'')}</button>)}
      </div>
      {dayM.length===0?<div className="card" style={{textAlign:'center',padding:40,color:'var(--txt-m)'}}><div style={{fontSize:32,marginBottom:10}}>📅</div><p>Aucun match</p></div>
      :dayM.map(m=>{
        const isDone=m.status==='finished',isLive=m.status==='live',isPaused=m.status==='paused';
        const dur=m.startedAt&&m.endedAt?getMatchDur(m,m.endedAt):'';
        const borderC=isLive?'var(--red)':isDone?'var(--green)':isPaused?'#b87000':'var(--bdr)';
        return<div key={m.id} className="card mb3" style={{borderLeft:`3px solid ${borderC}`}}>
          <div className="flex ai gap2 mb2" style={{flexWrap:'wrap'}}>
            {m.scheduledTime&&<span style={{fontFamily:'var(--fd)',fontWeight:700,color:'var(--clay)'}}>{m.scheduledTime}</span>}
            <span className={`badge ${isLive?'b-live':isDone?'b-done':isPaused?'b-info':'b-pend'}`}>
              {isLive&&<span className="dot"/>}
              {isLive?'En direct':isDone?(m.wo?'W.O.':m.abandonBy?'Abandon':'Terminé'):isPaused?'⏸ Pause':'À venir'}
            </span>
            {m.category&&<span style={{fontSize:13,color:'var(--txt-m)'}}>{m.category}</span>}
            {m.round&&<span style={{fontSize:12,color:'var(--txt-l)'}}>• {m.round}</span>}
            {dur&&<span className="badge b-info" style={{marginLeft:'auto'}}>⏱ {dur}</span>}
          </div>
          <ScoreDisplay match={m}/>
          {m.winner&&<div style={{marginTop:8,padding:'6px 10px',background:'var(--green-l)',borderRadius:'var(--r)',color:'var(--green)',fontWeight:600,fontSize:14,fontFamily:'var(--fd)',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            🏆 {m.winner===1?m.player1:m.player2}
            {m.wo&&<span style={{fontSize:12,fontWeight:400,color:'var(--txt-m)'}}>victoire par W.O.</span>}
            {m.abandonBy&&<span style={{fontSize:12,fontWeight:400,color:'var(--red)'}}>— abandon de {m.abandonBy===1?m.player1:m.player2}</span>}
            {(computeServiceStats(m)||computePointStats(m))&&<button className="btn btn-sm" style={{marginLeft:'auto',fontSize:12}} onClick={()=>setStatsMatch(m)}>📊 Stats</button>}
          </div>}
        </div>;
      })}
      <div className="sep"/>
      <h2 className="mb3">💬 Commentaires</h2>
      {user?<div className="flex ai gap2 mb4"><img src={user.photoURL||''} alt="" style={{width:34,height:34,borderRadius:'50%'}}/><input className="inp" placeholder="Laisser un commentaire…" onKeyDown={e=>{if(e.key==='Enter'&&e.target.value.trim()){onComment(e.target.value);e.target.value='';}}} /></div>
      :<div className="flex ai gap3 mb4" style={{padding:'12px 14px',background:'var(--sand-l)',borderRadius:'var(--rl)'}}><span style={{color:'var(--txt-m)',fontSize:14}}>Connectez-vous pour commenter</span><button className="btn btn-sm btn-p" onClick={onGoogleLogin}>Se connecter avec Google</button></div>}
      {dayCmts.length===0&&<p style={{color:'var(--txt-l)',fontSize:14}}>Aucun commentaire.</p>}
      {dayCmts.map(c=><div key={c.id} className="cmt-item"><img src={c.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(c.displayName||'?')}&size=32`} className="cmt-avatar" alt=""/><div><div style={{fontSize:13,fontWeight:600,color:'var(--txt-m)'}}>{c.displayName||'Anonyme'}</div><div style={{fontSize:15,marginTop:2}}>{c.text}</div><div style={{fontSize:11,color:'var(--txt-l)',marginTop:2}}>{c.ts?new Date(c.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):''}</div></div></div>)}
      {statsMatch&&<MatchStatsModal match={statsMatch} onClose={()=>setStatsMatch(null)}/>}      {fbTxt&&<div className="overlay" onClick={()=>setFbTxt('')}><div className="modal" onClick={e=>e.stopPropagation()}><h2 className="mb3">📘 Résumé Facebook</h2><textarea readOnly value={fbTxt} style={{width:'100%',height:300,padding:10,borderRadius:'var(--r)',border:'1px solid var(--bdr)',fontFamily:'var(--fb)',fontSize:14,background:'var(--cream)',resize:'none'}}/><div className="flex je gap3" style={{marginTop:14}}><button className="btn" onClick={()=>setFbTxt('')}>Fermer</button><button className="btn btn-p" onClick={()=>navigator.clipboard.writeText(fbTxt).then(()=>alert('✅ Copié !')).catch(()=>{})}>📋 Copier</button></div></div></div>}
    </div>
  );
}

// ── App principal ────────────────────────────────────────────────
function App(){
  const [data,setData]=useState(DEFAULT_DATA);
  const [fbConfig,setFbConfig]=useState(null);
  const [fbStatus,setFbStatus]=useState('disconnected');
  const [user,setUser]=useState(null);
  const [comments,setComments]=useState([]);
  const [ready,setReady]=useState(false);
  const [tab,setTab]=useState('matches');
  const [srvModal,setSrvModal]=useState(null);
  const skipRef=useRef(false);
  const mode=useMemo(()=>new URLSearchParams(window.location.search).get('v')||'admin',[]);

  useEffect(()=>{
    (async()=>{
      const [cfg,d]=await Promise.all([loadFBCfg(),loadData()]);
      if(d)setData(d);
      if(cfg)setFbConfig(cfg);
      setReady(true);
    })();
  },[]);

  useEffect(()=>{
    if(!fbConfig?.databaseURL)return;
    const ok=initFB(fbConfig);
    if(!ok){setFbStatus('error');return;}
    setFbStatus('connected');
    const dRef=_db.ref('tls_data');
    dRef.on('value',snap=>{if(skipRef.current){skipRef.current=false;return;}const v=snap.val();if(v){const raw=typeof v==='string'?JSON.parse(v):v;const d={...DEFAULT_DATA,...raw,matches:Array.isArray(raw.matches)?raw.matches:[],settings:{...DEFAULT_SETTINGS,...(raw.settings||{})}};setData(d);saveData(d);}});
    const cRef=_db.ref('tls_comments');
    cRef.on('value',snap=>{const v=snap.val();if(v)setComments(Object.values(v).sort((a,b)=>(a.ts||0)-(b.ts||0)));});
    _auth.onAuthStateChanged(u=>setUser(u));
    // Récupère le résultat si on revient d'un signInWithRedirect
    _auth.getRedirectResult().then(r=>{if(r?.user)setUser(r.user);}).catch(()=>{});
    return()=>{dRef.off();cRef.off();};
  },[fbConfig]);

  const update=useCallback(nd=>{
    setData(nd);saveData(nd);
    if(_db){skipRef.current=true;_db.ref('tls_data').set(deepCopy(nd)).catch(()=>{});}
  },[]);
  const updM=fn=>update({...data,matches:fn(data.matches)});

  const googleLogin=async()=>{
    if(!_auth)return alert('Configurez Firebase d\'abord (onglet Paramètres).');
    const provider=new firebase.auth.GoogleAuthProvider();
    try{
      await _auth.signInWithRedirect(provider);
    }catch(e){
      if(e.code==='auth/unauthorized-domain'){
        alert('Domaine non autorisé.\n\nAjoutez dans Firebase Console :\nAuthentication → Domaines autorisés\n\n'+window.location.hostname);
      }else if(e.code==='auth/configuration-not-found'||e.code==='auth/operation-not-allowed'){
        alert('Firebase Authentication non activé.\n\nDans Firebase Console :\n1. Authentication → Commencer\n2. Activer Google\n3. Ajouter le domaine : '+window.location.hostname);
      }else{
        alert('Erreur : '+(e.message||e.code));
      }
    }
  };
  const postComment=txt=>{
    if(!_db||!user)return;
    _db.ref('tls_comments').push({text:txt,displayName:user.displayName,photoURL:user.photoURL,uid:user.uid,ts:Date.now(),date:todayStr()});
  };

  // Démarrer un match (depuis Matchs ou Marqueur)
  const handleStartWithServer=m=>setSrvModal(m);
  const confirmServer=(sv,court)=>{
    const m=srvModal;setSrvModal(null);
    updM(ms=>ms.map(x=>x.id===m.id?{...x,status:'live',server:sv,firstServer:sv,court:court||x.court,startedAt:x.startedAt||Date.now()}:x));
  };

  if(!ready)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'var(--fd)',color:'var(--txt-m)',fontSize:18}}>Chargement…</div>;

  if(mode==='tv')return<TVDisplay data={data} comments={comments} user={user} onComment={postComment} onGoogleLogin={googleLogin} isPublic={true}/>;
  if(mode==='history')return<><HistoryPage data={data} comments={comments} user={user} onComment={postComment} onGoogleLogin={googleLogin}/><div style={{position:'fixed',top:12,right:14,zIndex:999,display:'flex',gap:8}}><a href={window.location.pathname} className="btn btn-sm">← Admin</a><a href={`${window.location.pathname}?v=tv`} className="btn btn-sm btn-dk">📺 TV</a></div></>;

  const tvURL=`${window.window.window.location.href.split('?')[0]}?v=tv`;
  const liveN=data.matches.filter(m=>m.status==='live').length;
  const themeKey=data.settings.theme||'terre_battue';
  const theme=THEMES[themeKey]||THEMES.terre_battue;

  return(
    <div className="shell">
      {/* Injection dynamique des variables CSS selon le thème */}
      <style>{`:root{--clay:${theme.admin.clay};--clay-h:${theme.admin.clayH};--clay-pale:${theme.admin.clayPale};--sand-l:${theme.admin.clayPale};}`}</style>
      <div className="topbar">
        <div><div className="topbar-title">{data.settings.tournamentName}</div><div style={{fontSize:11,color:'var(--sand-d)',letterSpacing:'1.5px',textTransform:'uppercase'}}>{data.settings.clubName}</div></div>
        <div className="flex ai gap2 ml-a" style={{flexWrap:'wrap'}}>
          {fbStatus==='connected'
            ?<span style={{fontSize:12,padding:'3px 10px',borderRadius:20,background:'rgba(45,122,79,.2)',color:'#5fb88a',border:'1px solid rgba(45,122,79,.3)'}}>🔥 Synchronisé</span>
            :<span style={{fontSize:12,padding:'3px 10px',borderRadius:20,background:'rgba(201,162,39,.1)',color:'#c9a227',border:'1px solid rgba(201,162,39,.3)',cursor:'pointer'}} onClick={()=>setTab('settings')}>○ Sans sync</span>
          }
          {liveN>0&&<span className="badge b-live"><span className="dot"/>{liveN} en direct</span>}
          <a href={tvURL} target="_blank" style={{padding:'5px 14px',borderRadius:20,background:'var(--clay)',color:'#fff',fontFamily:'var(--fd)',fontWeight:700,fontSize:13,textDecoration:'none',display:'flex',alignItems:'center',gap:5,boxShadow:'0 2px 8px rgba(196,92,38,.4)'}}>📺 TV</a>
          <a href={`${window.window.window.location.href.split('?')[0]}?v=history`} target="_blank" className="btn btn-sm">📊 Historique</a>
          <button className="btn btn-sm" onClick={()=>navigator.clipboard.writeText(tvURL).then(()=>alert('✅ Lien TV copié !')).catch(()=>{})}>📋 Lien TV</button>
          <button className="btn btn-sm" style={{borderColor:'var(--red)',color:'var(--red)'}}
            onClick={()=>{
              if(!confirm('⚠️ Supprimer TOUS les matchs et repartir sur un nouvel open ?\n\nLes paramètres (nom du tournoi, couleurs, joueurs…) seront conservés.\n\nCette action est irréversible.'))return;
              update({...data, matches:[]});
              setTab('matches');
            }}>
            🗑 Nouvel open
          </button>
        </div>
      </div>
      <div className="tabbar">
        {[['matches','🎾 Matchs'],['scorer','📱 Marqueur'],['stats','📊 Stats'],['settings','⚙ Paramètres']].map(([k,lbl])=>(
          <button key={k} className={`tabbtn${tab===k?' on':''}`} onClick={()=>setTab(k)}>{lbl}</button>
        ))}
      </div>
      <div className="page">
        {tab==='matches'&&<MatchesTab matches={data.matches} settings={data.settings}
          onAdd={fd=>updM(ms=>[...ms,newMatch(fd)])}
          onEdit={(id,fd)=>updM(ms=>ms.map(m=>m.id===id?{...m,...fd}:m))}
          onDelete={id=>updM(ms=>ms.filter(m=>m.id!==id))}
          onSetStatus={(id,st,extra)=>updM(ms=>ms.map(m=>m.id===id?{...m,status:st,...(extra||{}),startedAt:st==='live'&&!m.startedAt?Date.now():m.startedAt,endedAt:st==='finished'&&!m.endedAt?Date.now():m.endedAt}:m))}
          onWO={(id,winner)=>updM(ms=>ms.map(m=>m.id===id?{...m,status:'finished',winner,wo:true,endedAt:Date.now()}:m))}
          onPause={id=>updM(ms=>ms.map(m=>m.id===id?pauseMatch(m):m))}
          onResume={id=>updM(ms=>ms.map(m=>m.id===id?resumeMatch(m):m))}
          onStartWithServer={handleStartWithServer}
          onImport={ms=>updM(prev=>{
  const norm=s=>String(s||'').toLowerCase().replace(/\s+/g,' ').trim();
  const key=m=>{
    const players=[norm(m.player1),norm(m.player2)].sort();
    return[...players,norm(m.category),norm(m.round)].join('§');
  };
  // Dates présentes dans le fichier importé
  const importDates=[...new Set(ms.map(m=>m.date).filter(Boolean))];
  const result=[...prev];
  let added=0,updated=0;
  ms.forEach(imp=>{
    const k=key(imp);
    // Chercher parmi les matchs de la même date en priorité, sinon tous
    const sameDay=result.findIndex(x=>key(x)===k&&x.date===imp.date);
    const anyDay=result.findIndex(x=>key(x)===k);
    const idx=sameDay>=0?sameDay:anyDay;
    if(idx>=0){
      const ex=result[idx];
      result[idx]={...ex,
        scheduledTime: imp.scheduledTime||ex.scheduledTime,
        date:          imp.date!==undefined?imp.date:ex.date,
        court:         imp.court||ex.court,
        format:        ex.status==='pending'?(imp.format||ex.format):ex.format,
        round:         ex.status==='pending'?(imp.round||ex.round):ex.round,
        p1Club:        imp.p1Club||ex.p1Club,
        p2Club:        imp.p2Club||ex.p2Club,
        p1Ranking:     imp.p1Ranking||ex.p1Ranking,
        p2Ranking:     imp.p2Ranking||ex.p2Ranking,
        notes:         imp.notes||ex.notes,
      };
      updated++;
    } else {
      result.push(imp);
      added++;
    }
  });
  // Matchs en attente sur les dates importées mais absents du fichier → signaler
  const removed=prev.filter(x=>
    x.status==='pending' &&
    importDates.includes(x.date) &&
    !ms.find(imp=>key(imp)===key(x))
  );
  const msg=[];
  if(added)   msg.push(`${added} ajouté(s)`);
  if(updated) msg.push(`${updated} mis à jour`);
  if(removed.length) msg.push(`⚠️ ${removed.length} match(s) en attente absent(s) du fichier (non supprimé(s))`);
  if(msg.length) alert('✅ Import : '+msg.join('\n'));
  return result;
})}
          onCorrect={m=>updM(ms=>ms.map(x=>x.id===m.id?m:x))}/>
        }
        {tab==='scorer'&&<ScorerTab matches={data.matches} settings={data.settings}
          onAddGame={(id,p)=>updM(ms=>ms.map(m=>m.id===id?addGame(m,p,data.settings):m))}
          onUndo={id=>updM(ms=>ms.map(m=>m.id===id?undoGame(m):m))}
          onServer={(id,sv)=>updM(ms=>ms.map(m=>m.id===id?{...m,server:sv}:m))}
          onSetStatus={(id,st,extra)=>updM(ms=>ms.map(m=>m.id===id?{...m,status:st,...(extra||{}),endedAt:st==='finished'?Date.now():m.endedAt}:m))}
          onPause={id=>updM(ms=>ms.map(m=>m.id===id?pauseMatch(m):m))}
          onResume={id=>updM(ms=>ms.map(m=>m.id===id?resumeMatch(m):m))}
          onWO={(id,winner)=>updM(ms=>ms.map(m=>m.id===id?{...m,status:'finished',winner,wo:true,endedAt:Date.now()}:m))}
          onAddPoint={(id,p)=>updM(ms=>ms.map(m=>m.id===id?addPoint(m,p,data.settings):m))}
          onUndoPoint={id=>updM(ms=>ms.map(m=>m.id===id?undoPoint(m):m))}
          onToggleMode={(id,mode)=>updM(ms=>ms.map(m=>{
            if(m.id!==id)return m;
            if(mode.startsWith('_serve_')){const v=mode.slice(7);return{...m,_pendingServe:m._pendingServe===v?null:v};}
            if(mode.startsWith('_type_')){const v=mode.slice(6);return{...m,_pendingType:m._pendingType===v?null:v};}
            return{...m,scoringMode:mode,gameScore:[0,0]};
          }))}
          onStartWithServer={handleStartWithServer}/>
        }
        {tab==='stats'&&<StatsTab matches={data.matches} settings={data.settings}/>}
        {tab==='settings'&&<SettingsTab settings={data.settings}
          onSave={s=>update({...data,settings:s})}
          fbConfig={fbConfig}
          onFBSave={async cfg=>{await saveFBCfg(cfg);setFbConfig(cfg);}}
          fbStatus={fbStatus}/>
        }
      </div>
      {srvModal&&<ServerSelectModal match={srvModal} settings={data.settings} onStart={confirmServer} onClose={()=>setSrvModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
