const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── Constantes ─────────────────────────────────────────────────

// ── Thèmes visuels ────────────────────────────────────────────────

const DEFAULT_SETTINGS = {
  tournamentName:'Tournoi de Tennis', clubName:'Tennis Club',
  clubLogo:'', bgColor:'#0d1117', bgImage:'',
  primaryColor:'#ff6b1a', textColor:'#ffffff', accentColor:'#ffd700',
  sponsors:[], sponsorInterval:10, scrollMode:'scroll',
  categories:[...DEFAULT_CATS], formatLabels:{...DEFAULT_FORMAT_LABELS},
  players:[], courts:['Court N°1','Court N°2','Court Plastique'],
  gsheetUrl:'', theme:'terre_battue', tvUrl:'', weatherLat:'', weatherLon:'', weatherCity:'',
};
const DEFAULT_DATA = { matches:[], settings:DEFAULT_SETTINGS };

// Cherche un joueur dans la liste par correspondance de nom (insensible à la casse, partielle)
function enrichFromPlayerList(players, name){
  if(!players?.length||!name)return{};
  const n=name.toLowerCase().replace(/\s+/g,' ').trim();
  // Correspondance exacte d'abord, puis partielle
  const found=players.find(p=>{
    const pn=p.name.toLowerCase().replace(/\s+/g,' ').trim();
    return pn===n||n.includes(pn)||pn.includes(n);
  });
  if(!found)return{};
  return{club:found.club||'',ranking:found.ranking||''};
}

// Applique l'enrichissement sur un match importé
function enrichMatch(match, players){
  if(!players?.length)return match;
  const e1=enrichFromPlayerList(players,match.player1);
  const e2=enrichFromPlayerList(players,match.player2);
  return{
    ...match,
    p1Club: match.p1Club||e1.club||'',
    p2Club: match.p2Club||e2.club||'',
    p1Ranking: match.p1Ranking||e1.ranking||'',
    p2Ranking: match.p2Ranking||e2.ranking||'',
  };
}

// ── Utilitaires ─────────────────────────────────────────────────
const todayStr = () => {
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
function pauseMatch(m){const r=deepCopy(m);if(r.status!=='live')return r;r.status='paused';r.pausedAt=Date.now();return r;}
function resumeMatch(m){const r=deepCopy(m);if(r.status!=='paused')return r;r.totalPausedMs=(r.totalPausedMs||0)+(r.pausedAt?Date.now()-r.pausedAt:0);r.pausedAt=null;r.status='live';return r;}
function getMatchDur(m,now){if(!m.startedAt)return'';const end=m.endedAt||(m.status==='paused'?m.pausedAt:now)||now;return fmtDur(end-m.startedAt-(m.totalPausedMs||0));}
const deepCopy  = o => JSON.parse(JSON.stringify(o));
const fmtDur    = ms => { if(!ms||ms<0)return''; const m=Math.floor(ms/60000),h=Math.floor(m/60),mm=m%60; return h>0?`${h}h${String(mm).padStart(2,'0')}`:`${m}'`; };

// Hook responsive — adapte l'interface selon la largeur d'écran
function useWindowWidth(){
  const [w,setW]=useState(()=>window.innerWidth);
  useEffect(()=>{
    const h=()=>setW(window.innerWidth);
    window.addEventListener('resize',h);
    return()=>window.removeEventListener('resize',h);
  },[]);
  return w;
}
const fmtDateFR = d => { try{ return new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }catch(e){return d;} };
const scoreText = m => m.sets.map(s=>`${s[0]}-${s[1]}`).join(' ');

// Calcule les stats de service depuis l'historique du match
// Retourne [{won, lost}, {won, lost}] pour joueur 1 et joueur 2
function computeServiceStats(match){
  const history=match.history||[];
  if(!history.length)return null;
  const states=[...history,{sets:match.sets,server:match.server}];
  const stats=[{won:0,lost:0},{won:0,lost:0}];
  for(let i=0;i<history.length;i++){
    const before=history[i], after=states[i+1];
    const si=before.sets.length-1;
    if(!after.sets[si])continue;
    const b=before.sets[si], a=after.sets[si];
    if(!a||( a[0]===b[0]&&a[1]===b[1] ))continue; // aucun jeu complété (mode point)
    const winner=a[0]>b[0]?0:1; // 0=p1, 1=p2
    const server=before.server-1; // 0-indexed
    if(winner===server)stats[server].won++;
    else stats[server].lost++;
  }
  return stats;
}
// Découpe un nom de double "J1 / J2" avec classements et clubs correspondants
const splitDouble=(name,ranking,club)=>{
  if(!name)return[{n:name,r:ranking,c:club}];
  const ns=name.split(' / ');
  const rs=(ranking||'').split(' / ');
  const cs=(club||'').split(' / ');
  if(ns.length>=2)return[
    {n:ns[0].trim(),r:(rs[0]||'').trim(),c:(cs[0]||'').trim()},
    {n:ns[1].trim(),r:(rs[1]||rs[0]||'').trim(),c:(cs[1]||cs[0]||'').trim()},
  ];
  return[{n:name,r:ranking||'',c:club||''}];
};
const getFmt    = (m,s) => ({ ...BASE_FORMATS[m.format]||BASE_FORMATS.bo3, label:(s?.formatLabels?.[m.format])||DEFAULT_FORMAT_LABELS[m.format]||m.format });
// Pour la logique interne (addGame, recalcWinner) – compte tout set où un joueur mène
const countSW   = sets => sets.reduce((a,s)=>{ if(s[0]>s[1])a[0]++; else if(s[1]>s[0])a[1]++; return a; },[0,0]);
// Pour l'affichage – compte uniquement les sets effectivement terminés
const countWonSets = match => match.sets.reduce((a,s,i)=>{
  const isLast = i===match.sets.length-1;
  const done = checkSetWon(s) || (match.status==='finished' && isLast && s[0]!==s[1]);
  if(done){ if(s[0]>s[1])a[0]++; else if(s[1]>s[0])a[1]++; }
  return a;
},[0,0]);
const checkSetWon = ([a,b]) => { const mx=Math.max(a,b),mn=Math.min(a,b); return (mx>=6&&mx-mn>=2)||(mx===7&&mn===6); };
const timeToMin = s => { if(!s)return 9999; const[h,m]=s.split(':').map(Number); return h*60+m; };

// ── Logique point par point ───────────────────────────────────────
const POINT_LABELS=['0','15','30','40','Ad'];
function getGameScore(m){return m.gameScore||[0,0];}

function addPoint(match, player, settings){
  const m=deepCopy(match);
  if(m.status!=='live')return m;
  if(!m.gameScore)m.gameScore=[0,0];
  const fmt=getFmt(m,settings);
  const si=m.sets.length-1;
  const isFinalSet=si===fmt.sets-1;
  const isSuperTBFinal=fmt.finalSuper&&isFinalSet;
  const isTBOnly=fmt.tbOnly;
  const isTB=isSuperTBFinal||isTBOnly||(m.sets[si]&&m.sets[si][0]===6&&m.sets[si][1]===6&&!isSuperTBFinal&&!isTBOnly);
  const noAd=!!fmt.noAd;
  const pi=player-1, oi=1-pi;

  // Sauvegarde pour undo
  // Log du point : serveur + gagnant du point + contexte (pour stats)
  const fmt2=getFmt(m,settings);
  const si0=m.sets.length-1;
  const isFinalSet0=si0===fmt2.sets-1;
  const isTB0=(fmt2.finalSuper&&isFinalSet0)||fmt2.tbOnly||(m.sets[si0]&&m.sets[si0][0]===6&&m.sets[si0][1]===6);
  const gs0=m.gameScore||[0,0];
  // Est-ce un point de break ? (serveur en difficulté)
  const serverPi=m.server-1, receiverPi=1-serverPi;
  const isBreakPt=!isTB0&&(
    (gs0[serverPi]===0&&gs0[receiverPi]===3)||
    (gs0[serverPi]===1&&gs0[receiverPi]===3)||
    (gs0[serverPi]===2&&gs0[receiverPi]===3)||
    (gs0[serverPi]===3&&gs0[receiverPi]===4) // déuce-avantage relanceur
  );
  m.pointLog=[...(m.pointLog||[]),{server:m.server,winner:player,isTB:isTB0,isBreakPt,
    serve:match._pendingServe||null,    // '1' | '2' | null
    type:match._pendingType||null,      // 'ace'|'win'|'df'|'fe'|null
  }];
  m.history=[...(m.history||[]).slice(-200),deepCopy({sets:m.sets,server:m.server,status:m.status,winner:m.winner,endedAt:m.endedAt,gameScore:m.gameScore})];

  if(isTB||isTBOnly||isSuperTBFinal){
    // ── Tie-break : comptage brut ──────────────────────────────
    const target=isSuperTBFinal||isTBOnly?10:7;
    m.gameScore[pi]++;
    const p=m.gameScore[pi], q=m.gameScore[oi];
    const gameWon=p>=target&&p-q>=2;
    // Changement de service tous les 2 pts dans TB
    const total=m.gameScore[0]+m.gameScore[1];
    if(total>0&&total%2===1) m.server=3-m.server;
    if(gameWon){
      m.gameScore=[0,0];
      m.sets[si][pi]++;
      m.server=3-m.server; // service change après jeu TB
      const setWon=checkSetWon(m.sets[si])||(isSuperTBFinal||isTBOnly);
      if(setWon){
        const sw=countSW(m.sets),needed=isTBOnly?1:Math.ceil(fmt.sets/2);
        if(sw[pi]>=needed){m.status='finished';m.winner=player;m.endedAt=Date.now();}
        else if(m.sets.length<fmt.sets)m.sets.push([0,0]);
      }
    }
  } else {
    // ── Jeu normal ────────────────────────────────────────────
    // g values : 0=0, 1=15, 2=30, 3=40, 4=Avantage (non-noAd uniquement)
    const g=m.gameScore;
    let gameWon=false;

    if(g[oi]===4){
      // Adversaire avait l'avantage → retour à 40-40 (déuce)
      g[pi]=3; g[oi]=3;
    } else if(g[pi]===4){
      // pi a l'avantage → jeu gagné
      gameWon=true;
    } else if(g[pi]===3&&g[oi]===3){
      // 40-40 (déuce ou noAd)
      if(noAd){
        // Format doubles : point décisif → jeu gagné direct
        gameWon=true;
      } else {
        // Format simple : avantage
        g[pi]=4;
      }
    } else if(g[pi]===3){
      // 40-0, 40-15, 40-30 → jeu gagné
      gameWon=true;
    } else {
      // 0→15, 15→30, 30→40
      g[pi]++;
    }

    if(gameWon){
      m.gameScore=[0,0];
      m.sets[si][pi]++;
      m.server=3-m.server;
      const setWon=checkSetWon(m.sets[si]);
      if(setWon){
        const sw=countSW(m.sets),needed=Math.ceil(fmt.sets/2);
        if(sw[pi]>=needed){m.status='finished';m.winner=player;m.endedAt=Date.now();}
        else if(m.sets.length<fmt.sets)m.sets.push([0,0]);
      }
    }
  }
  m._pendingServe=null;
  m._pendingType=null;
  return m;
}

function undoPoint(match){
  const m=deepCopy(match);
  if(!m.history?.length)return m;
  const prev=m.history[m.history.length-1];
  m.history=m.history.slice(0,-1);
  m.pointLog=(m.pointLog||[]).slice(0,-1);
  return{...m,...prev,history:m.history,pointLog:m.pointLog};
}

function addGame(match, player, settings){
  const m=deepCopy(match);
  if(m.status!=='live')return m;
  const fmt=getFmt(m,settings), pi=player-1, si=m.sets.length-1;
  const isFinalSet=si===fmt.sets-1, isSuperTBFinal=fmt.finalSuper&&isFinalSet, isTBOnly=fmt.tbOnly;
  m.history=[...(m.history||[]).slice(-40),deepCopy({sets:m.sets,server:m.server,status:m.status,winner:m.winner,endedAt:m.endedAt})];
  m.sets[si][pi]++;
  m.server=3-m.server;
  const setWon=isSuperTBFinal||isTBOnly||checkSetWon(m.sets[si]);
  if(setWon){
    const sw=countSW(m.sets), needed=isTBOnly?1:Math.ceil(fmt.sets/2);
    if(sw[pi]>=needed){m.status='finished';m.winner=player;m.endedAt=Date.now();}
    else if(m.sets.length<fmt.sets)m.sets.push([0,0]);
  }
  return m;
}

function undoGame(match){
  const m=deepCopy(match);
  if(!m.history?.length){
    // Pas d'historique : on remet juste le match en live sans vainqueur
    m.status='live'; m.winner=null; m.endedAt=null;
    return m;
  }
  const prev=m.history[m.history.length-1];
  m.history=m.history.slice(0,-1);
  const result={...m,...prev};
  // Garantie absolue : après annulation, le match est toujours jouable
  result.status='live';
  result.winner=null;
  result.endedAt=null;
  return result;
}

function recalcWinner(match,settings){
  const m=deepCopy(match),fmt=getFmt(m,settings),sw=countSW(m.sets),needed=fmt.tbOnly?1:Math.ceil(fmt.sets/2);
  if(sw[0]>=needed){m.winner=1;m.status='finished';}
  else if(sw[1]>=needed){m.winner=2;m.status='finished';}
  else{m.winner=null;m.status='live';}
  return m;
}

// ── Parseur PDF (format FFT) ─────────────────────────────────────
const MONTHS_FR={janvier:'01',février:'02',fevrier:'02',mars:'03',avril:'04',mai:'05',juin:'06',juillet:'07',août:'08',aout:'08',septembre:'09',octobre:'10',novembre:'11',décembre:'12',decembre:'12'};
const RANK_RE=/^(\d+\/\d+|\d+|N\/C|NC)$/i;
const TIME_RE=/^\d{1,2}:\d{2}$/;
const CAT_RE=/^(SM|DM|SD|DD|MX|DH|DA)\b/i;

function parsePDF(raw){
  const lines=raw.split(/[\r\n]+/).map(l=>l.trim()).filter(Boolean);
  let matchDate=todayStr();
  for(const l of lines){const m=l.match(/(\d{1,2})\s+([\wéèêûôîàùæœ]+)\s+(\d{4})/i);if(m&&MONTHS_FR[m[2].toLowerCase()]){matchDate=`${m[3]}-${MONTHS_FR[m[2].toLowerCase()]}-${m[1].padStart(2,'0')}`;break;}}
  const blocks=[];let cur=null;
  for(const line of lines){
    if(CAT_RE.test(line)){if(cur)blocks.push(cur);cur={catLine:line,body:[],time:null};}
    else if(TIME_RE.test(line)){if(cur){blocks.push(cur);cur=null;}for(let i=blocks.length-1;i>=0;i--){if(blocks[i].time)break;blocks[i].time=line;}}
    else if(cur)cur.body.push(line);
  }
  if(cur)blocks.push(cur);
  return blocks.map(b=>parseBlock(b,matchDate)).filter(Boolean);
}

function parseBlock({catLine,body,time},matchDate){
  const ct=catLine.match(/^(SM|DM|SD|DD|MX|DH|DA)\s*(.*)/i);
  const catType=(ct?.[1]||'SM').toUpperCase(),catSuffix=(ct?.[2]||'').trim();
  const isDoubles=/^(DM|DD|MX)/.test(catType);
  const category=(catType+(catSuffix?' '+catSuffix:'')).trim();
  const lines=[...body];
  let round='';
  if(lines.length>0&&(/finale|quart|semi|demi|\d+\s*à\s*\d+/i.test(lines[0])||/^\d+\/\d+\s+à\s+\d+\/\d+$/.test(lines[0])))round=lines.shift();
  const full=lines.join(' ');
  const vsPos=full.search(/\bvs\b/i);
  const p1t=vsPos>=0?full.slice(0,vsPos).trim():full,p2t=vsPos>=0?full.slice(vsPos+2).trim():'';

  // Mots-clés qui indiquent le début d'un nom de club
  const CLUB_KW=/^(CLUB|TC|AS|US|STL|CSL|CERCLE|UNION|RACING|SPORTING|STADE|TENNIS|OMNISPORTS)$/;
  // Mots de stade/tour à ignorer dans les noms
  const ROUND_KW=/^(finale|demi|quart|semi|tour|poule)$/i;

  const extr=txt=>{
    // Supprimer les patterns de tour/stade embarqués ("1/8 finale", "1/4 de finale"…)
    const cleaned=txt
      .replace(/\d+\/\d+\s*(de\s+)?(finale|tour)/gi,' ')
      .replace(/\b(demi|quart)\s*[-–]?\s*finale\b/gi,' ')
      .trim();
    const toks=cleaned.split(/\s+/).filter(Boolean);
    const ranks=[],name=[],club=[];
    let inClub=false;
    for(const t of toks){
      if(RANK_RE.test(t)){ranks.push(t);continue;}
      if(ROUND_KW.test(t))continue; // ignorer les mots de stade résiduels
      const isAllCaps=t===t.toUpperCase()&&t.length>1&&!/^\d/.test(t)&&!/[àâéèêëîïôùûü]/i.test(t);
      if(inClub){club.push(t);continue;}
      if(isAllCaps&&CLUB_KW.test(t)){inClub=true;club.push(t);continue;}
      // Mot tout en caps mais PAS un mot-clé club → partie du nom (ex: "DURET", "CREVITS")
      name.push(t);
    }
    return{name:name.join(' ').trim(),club:club.join(' ').trim(),ranking:ranks[ranks.length-1]||''};
  };
  const i1=extr(p1t),i2=extr(p2t);
  return newMatch({player1:i1.name||'Joueur 1',player2:i2.name||'Joueur 2',p1Club:i1.club,p2Club:i2.club,p1Ranking:i1.ranking,p2Ranking:i2.ranking,category,round,format:isDoubles?'doubles':'bo3',scheduledTime:time||'',date:matchDate});
}

async function extractPDF(file){
  if(!window.pdfjsLib)throw new Error('PDF.js non chargé');
  window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.worker.min.js';
  const ab=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:ab}).promise;
  let text='';
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p),c=await page.getTextContent();
    const items=c.items.sort((a,b)=>{const yd=b.transform[5]-a.transform[5];return Math.abs(yd)>5?yd:a.transform[4]-b.transform[4]});
    text+=items.map(i=>i.str).join('\n')+'\n';
  }
  return{text,matches:parsePDF(text)};
}

    if(!n)return n;

    return caps.length>0?caps.join(' '):words[0];

// Calcule les stats de points (mode point par point)
function computePointStats(match){
  const log=match.pointLog||[];
  if(!log.length)return null;
  const mk=()=>({servePts:0,serveWon:0,returnPts:0,returnWon:0,
    bpFaced:0,bpSaved:0,bpOpp:0,bpConv:0,
    firstIn:0,firstWon:0,firstTotal:0,
    secondIn:0,secondWon:0,secondTotal:0,
    aces:0,dfs:0,winners:0,errors:0,totalPts:0,totalWon:0});
  const s={p1:mk(),p2:mk()};
  log.forEach(({server,winner,isBreakPt,isTB,serve,type})=>{
    if(!server||!winner)return;
    const srv=server===1?'p1':'p2';
    const rcv=server===1?'p2':'p1';
    const win=winner===1?'p1':'p2';
    // Points totaux
    s[srv].totalPts++; s[rcv].totalPts++;
    if(win===srv)s[srv].totalWon++; else s[rcv].totalWon++;
    // Service/retour
    s[srv].servePts++;
    s[rcv].returnPts++;
    if(win===srv)s[srv].serveWon++; else s[rcv].returnWon++;
    // Break points
    if(isBreakPt){
      s[srv].bpFaced++;s[rcv].bpOpp++;
      if(win===rcv)s[rcv].bpConv++; else s[srv].bpSaved++;
    }
    // 1ère / 2ème balle
    if(serve==='1'){
      s[srv].firstTotal++;
      if(type!=='df'){s[srv].firstIn++;if(win===srv)s[srv].firstWon++;}
    } else if(serve==='2'){
      s[srv].secondTotal++;
      if(type!=='df'){s[srv].secondIn++;if(win===srv)s[srv].secondWon++;}
    }
    // Types de points
    if(type==='ace')s[srv].aces++;
    if(type==='df')s[srv].dfs++;
    if(type==='win')s[win].winners++;
    if(type==='fe')s[win==='p1'?'p2':'p1'].errors++;
  });
  return s;
}

  const [sets,setSets]=useState(deepCopy(match.sets));
  const fmt=getFmt(match,settings);
  const inc=(si,pi)=>setSets(s=>{const n=deepCopy(s);n[si][pi]++;return n;});
  const dec=(si,pi)=>setSets(s=>{const n=deepCopy(s);if(n[si][pi]>0)n[si][pi]--;return n;});
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
