// ── FirebaseModal ────────────────────────────────────────────────
function FirebaseModal({config,onSave,onClose}){
  const BL={apiKey:'',authDomain:'',databaseURL:'',projectId:'',storageBucket:'',messagingSenderId:'',appId:''};
  const [f,sf]=useState(config||BL);
  const s=(k,v)=>sf(p=>({...p,[k]:v}));
  const fields=[['apiKey','API Key'],['authDomain','Auth Domain'],['databaseURL','Database URL ← Realtime DB'],['projectId','Project ID'],['storageBucket','Storage Bucket'],['messagingSenderId','Messaging Sender ID'],['appId','App ID']];
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h2 className="mb3">🔥 Configuration Firebase</h2>
        <div className="warn-box">1) <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> → Créer projet<br/>2) Activer <b>Realtime Database</b> → mode test<br/>3) ⚙ Paramètres → Apps → ⊕ Web → copier config</div>
        {fields.map(([k,lbl])=>(
          <div key={k} style={{marginBottom:9}}><label className="lbl">{lbl}</label><input className="inp" value={f[k]||''} onChange={e=>s(k,e.target.value)} style={{fontFamily:'monospace',fontSize:12}}/></div>
        ))}
        <div className="flex je gap3" style={{marginTop:14}}><button className="btn" onClick={onClose}>Annuler</button><button className="btn btn-p" onClick={()=>onSave(f)}>Connecter</button></div>
      </div>
    </div>
  );
}

// ── TVDisplay ─────────────────────────────────────────────────────
function TVDisplay({data,comments,user,onComment,onGoogleLogin,isPublic}){
  const {matches,settings}=data;
  const today=todayStr();
  // Sidebar = matchs du jour (ou tous si aucun aujourd'hui)
  const todayM=useMemo(()=>{
    const td=matches.filter(m=>m.date&&m.date===today);
    const withDate=matches.filter(m=>m.date);
    return (td.length>0?td:withDate).sort((a,b)=>timeToMin(a.scheduledTime)-timeToMin(b.scheduledTime));
  },[matches,today]);
  // Live = TOUS les matchs en cours, peu importe la date
  const live=useMemo(()=>matches.filter(m=>m.status==='live'),[matches]);
  const [scrollIdx,setScrollIdx]=useState(0);
  const [sponsorIdx,setSponsorIdx]=useState(0);
  const [time,setTime]=useState(new Date());
  const [durs,setDurs]=useState({});
  const [showStats,setShowStats]=useState(new Set());
  const [cmtIn,setCmtIn]=useState('');
  const [palmIdx,setPalmIdx]=useState(0);
  const [weather,setWeather]=useState(null);
  const pc=settings.primaryColor||'#c45c26',tc=settings.textColor||'#f5e8d5',ac=settings.accentColor||'#c9a227',bg=settings.bgColor||'#120701';
  const themeKey=settings.theme||'terre_battue';
  const themeObj=THEMES[themeKey]||THEMES.terre_battue;
  const layout=themeObj.layout||'classic';
  const d=themeObj.design;

  useEffect(()=>{const t=setInterval(()=>{setTime(new Date());setDurs(d=>{const n={...d};live.forEach(m=>{if(m.startedAt)n[m.id]=fmtDur(Date.now()-m.startedAt)});return n});},1000);return()=>clearInterval(t);},[live.length]);
  const finishedToday=matches.filter(m=>m.status==='finished'&&m.date===todayStr());
  useEffect(()=>{if(finishedToday.length<2)return;const t=setInterval(()=>setPalmIdx(i=>(i+1)%finishedToday.length),6000);return()=>clearInterval(t);},[finishedToday.length]);
  useEffect(()=>{
    const lat=settings.weatherLat,lon=settings.weatherLon;
    if(!lat||!lon)return;
    const codes={0:'☀️ Clair',1:'🌤 Dégagé',2:'⛅ Nuageux',3:'☁️ Couvert',45:'🌫 Brouillard',48:'🌫 Brouillard',51:'🌦 Bruine',53:'🌦 Bruine',55:'🌧 Bruine',61:'🌧 Pluie',63:'🌧 Pluie',65:'🌧 Pluie forte',71:'🌨 Neige',73:'🌨 Neige',75:'❄️ Neige',80:'🌦 Averses',81:'🌧 Averses',82:'⛈ Averses',95:'⛈ Orage',96:'⛈ Orage',99:'⛈ Orage'};
    const fetch1=async()=>{try{
      const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,weather_code,wind_speed_10m&wind_speed_unit=kmh&timezone=auto');
      const j=await r.json();const c=j.current;const code=c.weather_code;
      const label=codes[code]||'🌡 Météo';const parts=label.split(' ');
      setWeather({emoji:parts[0],desc:parts.slice(1).join(' '),temp:Math.round(c.temperature_2m),wind:Math.round(c.wind_speed_10m)});
    }catch(e){console.warn('Météo indisponible',e);}};
    fetch1();const t=setInterval(fetch1,30*60*1000);return()=>clearInterval(t);
  },[settings.weatherLat,settings.weatherLon]);
  useEffect(()=>{if(live.length<=2)return;const t=setInterval(()=>setScrollIdx(i=>(i+2)%live.length),9000);return()=>clearInterval(t);},[live.length]);
  useEffect(()=>{if(!(settings.sponsors?.length))return;const t=setInterval(()=>setSponsorIdx(i=>(i+1)%settings.sponsors.length),(settings.sponsorInterval||10)*1000);return()=>clearInterval(t);},[settings.sponsors?.length,settings.sponsorInterval]);

  const displayed=live.length>2?live.slice(scrollIdx,scrollIdx+2):live;
  const lastCmt=(comments||[]).slice(-1)[0];

  const TVMatch=({match})=>{
    const f=getFmt(match,settings),sw=countWonSets(match),isLive=match.status==='live',isDone=match.status==='finished';
    const isFinal=match.sets.length===f.sets,isSuperFinal=f.finalSuper&&isFinal,isTBOnly=f.tbOnly;
    const si=match.sets.length-1;
    const isAtTB=!isSuperFinal&&!isTBOnly&&match.sets[si]&&match.sets[si][0]===6&&match.sets[si][1]===6;
    const dur=match.startedAt?(isDone&&match.endedAt?getMatchDur(match,match.endedAt):durs[match.id]||''):'';
    const cardStyle={borderRadius:d.cardRadius,overflow:'hidden',boxShadow:`0 4px 24px rgba(0,0,0,.4)`,border:`${d.cardBorder} ${isDone?ac:pc}44`};
    const tbLabel=isSuperFinal||isTBOnly?'ST':isAtTB?'TB':null;
    // Score dans le jeu (mode point)
    const isPointMode=match.scoringMode==='point';
    const gs=match.gameScore||[0,0];
    const glTV=p=>tbLabel?String(p):POINT_LABELS[Math.min(p,4)]||'Ad';

    // ── Stats communes ──────────────────────────────────────────────
    const StatsPanel=()=>{
      const st=computeServiceStats(match);
      const pt=computePointStats(match);
      if(!st&&!pt)return null;
      const pct=(a,b)=>b>0?Math.round(a/b*100)+'%':'—';
      const nameOf=pi=>{const n=pi===0?match.player1:match.player2;const caps=n.trim().split(' ').filter(w=>w.length>1&&w===w.toUpperCase());return(caps.length>0?caps.slice(0,2).join(' '):n.split(' ')[0]);};
      const Row=({label,v1,v2,hi})=>(<tr style={{borderTop:'1px solid rgba(255,255,255,.06)'}}><td style={{fontFamily:'var(--fb)',fontSize:'clamp(9px,1vw,12px)',color:tc,opacity:.6,paddingTop:4,paddingBottom:4}}>{label}</td>{[[v1,hi],[v2,hi]].map(([v,h],i)=><td key={i} style={{textAlign:'center',paddingTop:4,paddingBottom:4}}><span style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:'clamp(13px,1.8vw,20px)',color:h?ac:tc,opacity:h?1:.55}}>{v}</span></td>)}</tr>);
      return(
        <div style={{padding:'10px 20px',borderTop:`1px solid rgba(255,255,255,.1)`,background:'rgba(0,0,0,.2)'}}>
          <div style={{fontFamily:'var(--fb)',fontSize:'clamp(8px,.9vw,10px)',letterSpacing:2,textTransform:'uppercase',opacity:.45,color:tc,marginBottom:8}}>Statistiques</div>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr><td style={{width:'45%'}}/>
              {[0,1].map(pi=><td key={pi} style={{textAlign:'center',fontFamily:'var(--fd)',fontWeight:700,fontSize:'clamp(10px,1.2vw,14px)',color:match.winner===pi+1?ac:tc,paddingBottom:5,opacity:match.winner&&match.winner!==pi+1?.5:1}}>{nameOf(pi)}</td>)}
            </tr></thead>
            <tbody>
              {st&&<><Row label="🎾 Jeux service gagnés" v1={st[0].won} v2={st[1].won} hi/><Row label="💔 Jeux service perdus" v1={st[0].lost} v2={st[1].lost}/><Row label="⚡ Breaks gagnés" v1={st[1].lost} v2={st[0].lost} hi/></>}
              {pt&&<>
                {st&&<tr><td colSpan={3}><div style={{height:1,background:'rgba(255,255,255,.1)',margin:'4px 0'}}/></td></tr>}
                <Row label="📊 % pts sur service" v1={pct(pt.p1.serveWon,pt.p1.servePts)} v2={pct(pt.p2.serveWon,pt.p2.servePts)} hi/>
                <Row label="↩ % pts en retour" v1={pct(pt.p1.returnWon,pt.p1.returnPts)} v2={pct(pt.p2.returnWon,pt.p2.returnPts)} hi/>
                <Row label="🔴 BP convertis" v1={pt.p1.bpConv+'/'+pt.p1.bpOpp} v2={pt.p2.bpConv+'/'+pt.p2.bpOpp} hi/>
                <Row label="🛡 BP sauvées" v1={pt.p1.bpSaved+'/'+pt.p1.bpFaced} v2={pt.p2.bpSaved+'/'+pt.p2.bpFaced}/>
              </>}
            </tbody>
          </table>
        </div>
      );
    };

    // ── Header commun ───────────────────────────────────────────────
    const CardHeader=({accent})=>(
      <div style={{padding:'7px 16px',display:'flex',alignItems:'center',gap:10,background:isDone?`${ac}20`:d.headerBg,fontFamily:'var(--fb)',fontSize:12,letterSpacing:1,textTransform:'uppercase',color:tc,borderBottom:`1px solid rgba(255,255,255,.08)`}}>
        {isLive&&<><div className="dot" style={{width:8,height:8}}/><span style={{color:'#ff4444',fontWeight:700,letterSpacing:2}}>LIVE</span></>}
        {isDone&&<span style={{color:ac,fontWeight:700}}>TERMINÉ</span>}
        {match.category&&<span style={{opacity:.7,fontSize:11}}>{match.category}</span>}
        {match.round&&<span style={{opacity:.45,fontSize:10}}>• {match.round}</span>}
        {match.court&&<span style={{opacity:.45,fontSize:10}}>• {match.court}</span>}
        {match.scheduledTime&&<span style={{color:ac,marginLeft:'auto',fontWeight:700}}>🕐 {match.scheduledTime}</span>}
        {dur&&!match.scheduledTime&&<span style={{marginLeft:'auto',color:ac,fontWeight:700}}>⏱ {dur}</span>}
      </div>
    );

    // ══════════════════════════════════════════════════════════════
    // LAYOUT : CLASSIC (Terre Battue)
    // ══════════════════════════════════════════════════════════════
    if(layout==='classic')return(
      <div style={{...cardStyle,background:d.cardBg,borderTop:`3px solid ${isDone?ac:pc}`}}>
        <CardHeader/>
        {[0,1].map(pi=>{
          const oi=1-pi,won=match.winner===pi+1,lead=sw[pi]>sw[oi];
          const pn=pi===0?match.player1:match.player2,pclub=pi===0?match.p1Club:match.p2Club,pr=pi===0?match.p1Ranking:match.p2Ranking;
          const parts=splitDouble(pn,pr,pclub);
          return(
            <div key={pi} className="tv-prow" style={{opacity:isDone&&!won?.5:1,background:pi%2===0?'rgba(255,255,255,.02)':'transparent'}}>
              <div className="tv-serve" style={{background:match.server===pi+1&&isLive?pc:'transparent',boxShadow:match.server===pi+1&&isLive?`0 0 10px ${pc}`:'none'}}/>
              <div className="tv-pname" style={{color:won?ac:tc}}>
                {parts.map((p,i)=>(
                  <div key={i} style={{marginBottom:i<parts.length-1?3:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      {i===0&&won&&<span>🏆 </span>}
                      <span style={{fontSize:'clamp(16px,2.4vw,28px)',fontWeight:won?900:700,textShadow:won?`0 0 20px ${ac}66`:'none'}}>{p.n}</span>
                      {p.r&&<span style={{fontSize:'clamp(11px,1.3vw,16px)',fontWeight:700,color:ac,background:`${ac}22`,padding:'1px 7px',borderRadius:4}}>{p.r}</span>}
                    </div>
                    {p.c&&<div style={{fontSize:'clamp(10px,1.2vw,14px)',opacity:.6,fontFamily:'var(--fb)',marginTop:1}}>{p.c}</div>}
                  </div>
                ))}
              </div>
              {isLive&&isPointMode&&<div style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:'clamp(22px,3vw,42px)',color:pi===0?pc:ac,minWidth:'clamp(36px,4vw,56px)',textAlign:'center',lineHeight:1,textShadow:`0 0 16px ${pi===0?pc:ac}88`,marginRight:16}}>{glTV(gs[pi])}</div>}
              <div className="tv-psets">{match.sets.map((st,i)=>{const setDone=checkSetWon(st)||(isDone&&i===match.sets.length-1&&st[0]!==st[1]);const w=setDone&&st[pi]>st[oi];return<div key={i} className={`tv-pset${w?' w':''}`} style={{fontSize:d.scoreFontSize,color:w?'#fff':tc,fontWeight:w?900:600}}>{st[pi]}</div>;})}</div>
              <div className={`tv-swon${lead?' lead':''}`} style={{color:lead?ac:'rgba(255,255,255,.2)',textShadow:lead?`0 0 20px ${ac}88`:'none',fontSize:'clamp(26px,3.5vw,40px)'}}>{sw[pi]}</div>
            </div>
          );
        })}
        {isDone&&<div style={{padding:'8px 18px',borderTop:`1px solid ${ac}33`,background:`${ac}10`,textAlign:'center'}}><span style={{color:ac,fontWeight:700,fontSize:'clamp(14px,1.8vw,20px)'}}>{match.sets.map(s=>`${s[0]}–${s[1]}`).join('  ')}</span>{dur&&<span style={{color:tc,opacity:.7,fontSize:'clamp(12px,1.5vw,18px)',marginLeft:14}}>⏱ {dur}</span>}</div>}
