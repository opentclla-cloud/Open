// ── GSheetImportModal ─────────────────────────────────────────────
function GSheetImportModal({settings,onImport,onClose}){
  const [url,setUrl]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [preview,setPreview]=useState(null);

  // Extrait l'ID du sheet depuis différents formats d'URL Google Sheets
  const extractSheetId=u=>{
    const m=u.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    return m?m[1]:null;
  };

  const extractGid=u=>{
    const m=u.match(/[#&?]gid=(\d+)/);
    return m?m[1]:'0';
  };

  const fetchSheet=async()=>{
    setErr('');setLoading(true);setPreview(null);
    try{
      const id=extractSheetId(url);
      if(!id)throw new Error('URL invalide. Copiez l\'URL complète depuis la barre d\'adresse Google Sheets.');
      const gid=extractGid(url);
      // Export CSV public (fonctionne si le sheet est publié ou partagé en lecture)
      const csvUrl=`https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
      const resp=await fetch(csvUrl);
      if(!resp.ok)throw new Error(`Impossible de lire le fichier (${resp.status}). Vérifiez que le document est bien partagé en lecture publique.`);
      const text=await resp.text();
      if(!text.trim())throw new Error('Le document est vide.');
      // Parse CSV
      const rows=parseCSV(text);
      if(rows.length<2)throw new Error('Pas assez de lignes dans le document.');
      // Réutilise le même parseur que Excel
      const matches=parseXLSRowsStatic(rows,todayStr(),settings);
      if(matches.length===0)throw new Error('Aucun match détecté. Vérifiez le format de votre feuille.');
      setPreview({rows,matches});
    }catch(e){setErr(e.message);}
    setLoading(false);
  };

  const parseCSV=text=>{
    const lines=text.split(/\r?\n/);
    return lines.map(line=>{
      const cells=[];let cur='',inQ=false;
      for(let i=0;i<line.length;i++){
        const ch=line[i];
        if(ch==='"'&&!inQ){inQ=true;}
        else if(ch==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
        else if(ch==='"'&&inQ){inQ=false;}
        else if(ch===','&&!inQ){cells.push(cur);cur='';}
        else cur+=ch;
      }
      cells.push(cur);
      return cells.map(c=>c.trim());
    }).filter(r=>r.some(c=>c));
  };

  const [editPreview,setEditPreview]=useState([]);
  useEffect(()=>{if(preview)setEditPreview(preview.matches);},[preview]);
  const upd=(i,k,v)=>setEditPreview(p=>p.map((m,j)=>j===i?{...m,[k]:v}:m));

  const cats=settings?.categories||DEFAULT_CATS;
  const fmtL=settings?.formatLabels||DEFAULT_FORMAT_LABELS;

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:preview?980:520}} onClick={e=>e.stopPropagation()}>
        <div className="flex ai jb mb4">
          <h2>🔗 Import Google Sheets</h2>
          <button className="btn btn-sm btn-ghost" onClick={onClose}>✕</button>
        </div>

        {!preview&&<>
          <div className="info-box">
            <strong>Comment préparer votre Google Sheet :</strong><br/>
            1. Utilisez le même format que le modèle Excel (colonnes : Joueur1, Joueur2, ClubJ1, ClubJ2, Cl.J1, Cl.J2, Catégorie, Tour, Court, Format, Heure, Date)<br/>
            <strong>OU</strong> le format FFT avec les colonnes J1/J2/J3/J4.<br/><br/>
            2. Fichier → <strong>Partager → Tout le monde disposant du lien → Lecteur</strong><br/>
            3. Copiez l'URL et collez-la ci-dessous.
          </div>
          {err&&<div className="err-box">{err}</div>}
          <div className="mb3">
            <label className="lbl">URL du Google Sheet</label>
            <input className="inp" value={url} onChange={e=>setUrl(e.target.value)}
              placeholder="https://docs.google.com/spreadsheets/d/..."
              onKeyDown={e=>e.key==='Enter'&&url.trim()&&fetchSheet()}/>
          </div>
          <div className="flex je gap3">
            <button className="btn" onClick={onClose}>Annuler</button>
            <button className="btn btn-p" onClick={fetchSheet} disabled={!url.trim()||loading}>
              {loading?'⏳ Chargement…':'📥 Charger les données'}
            </button>
          </div>
        </>}

        {preview&&<>
          <div className="info-box">✅ {editPreview.length} match(s) détecté(s). Vérifiez avant d'importer.</div>
          <div style={{overflowX:'auto',marginBottom:14}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead><tr style={{background:'var(--sand-l)'}}>
                {['Heure','Catégorie','Joueur 1','Club J1','Cl.J1','Joueur 2','Club J2','Cl.J2','Format','Date',''].map((h,i)=>(
                  <th key={i} style={{padding:'5px 6px',textAlign:'left',fontWeight:600,fontSize:11,color:'var(--txt-m)',borderBottom:'1px solid var(--bdr)',whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {editPreview.map((m,i)=>(
                  <tr key={i} style={{borderBottom:'1px solid var(--bdr-l)'}}>
                    <td><input className="inp" value={m.scheduledTime} onChange={e=>upd(i,'scheduledTime',e.target.value)} style={{width:64,padding:'3px 5px',fontSize:12}}/></td>
                    <td><select className="inp" value={m.category} onChange={e=>upd(i,'category',e.target.value)} style={{padding:'3px 5px',fontSize:12,minWidth:100}}>{cats.map(c=><option key={c} value={c}>{c}</option>)}<option value={m.category}>{m.category}</option></select></td>
                    <td><input className="inp" value={m.player1} onChange={e=>upd(i,'player1',e.target.value)} style={{width:110,padding:'3px 5px',fontSize:12}}/></td>
                    <td><input className="inp" value={m.p1Club} onChange={e=>upd(i,'p1Club',e.target.value)} style={{width:90,padding:'3px 5px',fontSize:12}}/></td>
                    <td><input className="inp" value={m.p1Ranking} onChange={e=>upd(i,'p1Ranking',e.target.value)} style={{width:46,padding:'3px 5px',fontSize:12}}/></td>
                    <td><input className="inp" value={m.player2} onChange={e=>upd(i,'player2',e.target.value)} style={{width:110,padding:'3px 5px',fontSize:12}}/></td>
                    <td><input className="inp" value={m.p2Club} onChange={e=>upd(i,'p2Club',e.target.value)} style={{width:90,padding:'3px 5px',fontSize:12}}/></td>
                    <td><input className="inp" value={m.p2Ranking} onChange={e=>upd(i,'p2Ranking',e.target.value)} style={{width:46,padding:'3px 5px',fontSize:12}}/></td>
                    <td><select className="inp" value={m.format} onChange={e=>upd(i,'format',e.target.value)} style={{padding:'3px 5px',fontSize:12,minWidth:70}}>{Object.entries(fmtL).map(([k,v])=><option key={k} value={k}>{v.slice(0,10)}</option>)}</select></td>
                    <td><input className="inp" type="date" value={m.date} onChange={e=>upd(i,'date',e.target.value)} style={{width:115,padding:'3px 5px',fontSize:12}}/></td>
                    <td><button className="btn btn-xs btn-ghost" style={{color:'var(--red)'}} onClick={()=>setEditPreview(p=>p.filter((_,j)=>j!==i))}>✕</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="flex gap3 je">
            <button className="btn" onClick={()=>setPreview(null)}>← Retour</button>
            <button className="btn btn-p" onClick={()=>onImport(editPreview.map(m=>enrichMatch(m,settings?.players)))}>Importer {editPreview.length} match(s)</button>
          </div>
        </>}
      </div>
    </div>
  );
}

// Parseur partagé (utilisé par XLS et GSheet)
function parseXLSRowsStatic(rows, today, settings){
  if(!rows.length)return[];
  const header=(rows[0]||[]).map(c=>String(c||'').toLowerCase().trim());
  const isFFT=header.some(h=>h.includes('epreuve')||h.includes('nom prénom j1')||h.includes('nom prenom j1'));
  const parseDate=d=>{
    if(!d&&d!==0)return '';
    if(typeof d==='number'){
      // Numéro de série Excel → date calendaire locale (évite décalage UTC)
      const dt=new Date(Math.round((d-25569)*86400000));
      return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    }
    const s=String(d).trim();
    if(!s)return '';
    // JJ/MM/AAAA
    const m1=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(m1)return`${m1[3]}-${m1[2].padStart(2,'0')}-${m1[1].padStart(2,'0')}`;
    // JJ/MM (sans année → année en cours)
    const m2=s.match(/^(\d{1,2})\/(\d{1,2})$/);
    if(m2){const y=new Date().getFullYear();return`${y}-${m2[2].padStart(2,'0')}-${m2[1].padStart(2,'0')}`;}
    // AAAA-MM-JJ (ISO)
    if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
    return '';
  };
  const parseTime=t=>{
    if(!t&&t!==0)return'';
    if(typeof t==='number'){const tm=Math.round(t*1440);return`${String(Math.floor(tm/60)).padStart(2,'0')}:${String(tm%60).padStart(2,'0')}`;}
    return String(t).trim();
  };
  const detectFmt=cat=>/doub|double|dm\b|dd\b|dx\b|mx\b/.test((cat||'').toLowerCase())?'doubles':'bo3';
  const g=(r,i)=>(i!==undefined&&r[i]!==undefined&&r[i]!==null)?String(r[i]).trim():'';

  if(isFFT){
    const hdr=rows[0],idx={};
    hdr.forEach((c,i)=>{const h=String(c||'').toLowerCase().trim();
      if(h.includes('epreuve'))idx.cat=i;
      else if(h.includes('découpage')||h.includes('decoupage'))idx.round=i;
      else if(h==='tour')idx.tour=i;
      else if(h==='date')idx.date=i;
      else if(h==='heure')idx.time=i;
      else if(h==='court')idx.court=i;
      else if(h.includes('j1')&&(h.includes('nom')||h.includes('prénom')))idx.p1n=i;
      else if(h==='clt j1')idx.p1r=i;
      else if(h.includes('j2')&&(h.includes('nom')||h.includes('prénom')))idx.p2n=i;
      else if(h==='clt j2')idx.p2r=i;
      else if(h.includes('j3')&&(h.includes('nom')||h.includes('prénom')))idx.p3n=i;
      else if(h==='clt j3')idx.p3r=i;
      else if(h.includes('j4')&&(h.includes('nom')||h.includes('prénom')))idx.p4n=i;
      else if(h==='clt j4')idx.p4r=i;
    });
    let lastDate='';
    return rows.slice(1).filter(r=>r&&g(r,idx.p1n)).map(r=>{
      const d=parseDate(r[idx.date]);
      if(d)lastDate=d; // propagation : hérite la date de la ligne précédente si vide
      const p1n=g(r,idx.p1n),p2n=g(r,idx.p2n),p3n=g(r,idx.p3n),p4n=g(r,idx.p4n);
      const p1r=g(r,idx.p1r),p2r=g(r,idx.p2r),p3r=g(r,idx.p3r),p4r=g(r,idx.p4r);
      const isDoubles=!!p2n;
      const player1=isDoubles?`${p1n} / ${p2n}`.trim():p1n;
      const player2=isDoubles?`${p3n}${p4n?' / '+p4n:''}`.trim():p3n;
      const p1Ranking=isDoubles?`${p1r}${p2r?' / '+p2r:''}`.trim():p1r;
      const p2Ranking=isDoubles?`${p3r}${p4r?' / '+p4r:''}`.trim():p3r;
      const roundText=[g(r,idx.round),g(r,idx.tour)?`Tour ${g(r,idx.tour)}`:''].filter(Boolean).join(' – ');
      return newMatch({player1,player2,p1Ranking,p2Ranking,p1Club:'',p2Club:'',category:g(r,idx.cat),round:roundText,court:g(r,idx.court),format:isDoubles?'doubles':detectFmt(g(r,idx.cat)),scheduledTime:parseTime(r[idx.time]),date:lastDate});
    }).filter(m=>m.player1&&m.player2);
  } else {
    return rows.slice(1).filter(r=>r&&r[0]&&r[1]).map(r=>newMatch({
      player1:g(r,0),player2:g(r,1),p1Club:g(r,2),p2Club:g(r,3),
      p1Ranking:g(r,4),p2Ranking:g(r,5),category:g(r,6),round:g(r,7),
      court:g(r,8),format:g(r,9)||'bo3',scheduledTime:g(r,10),
      date:parseDate(r[11])||today,
    }));
  }
}

// ── MatchesTab ───────────────────────────────────────────────────
function MatchesTab({matches,settings,onAdd,onEdit,onDelete,onSetStatus,onStartWithServer,onImport,onCorrect,onWO,onPause,onResume}){
  const [showModal,setShowModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [correcting,setCorrecting]=useState(null);
  const [showPDF,setShowPDF]=useState(false);
  const [showGSheet,setShowGSheet]=useState(false);
  const [gSheetLoading,setGSheetLoading]=useState(false);
  const [abandonTarget,setAbandonTarget]=useState(null);
  const [filter,setFilter]=useState('all');
  const xlsRef=useRef();
  const today=todayStr();
  const sorted=useMemo(()=>matches.filter(m=>filter==='all'?true:filter==='today'?m.date===today:m.status===filter).sort((a,b)=>(a.scheduledTime||'99:99').localeCompare(b.scheduledTime||'99:99')),[matches,filter,today]);
  const counts=useMemo(()=>({all:matches.length,today:matches.filter(m=>m.date===today).length,live:matches.filter(m=>m.status==='live').length,finished:matches.filter(m=>m.status==='finished').length}),[matches,today]);
  // Détecte et parse le format FFT (colonnes J1/J2/J3/J4) OU le format template simple
  const parseXLSRows = (rows) => {
    if (!rows.length) return [];
    const header = (rows[0]||[]).map(c=>String(c||'').toLowerCase().trim());
    const isFFT = header.some(h=>h.includes('epreuve')||h.includes('nom prénom j1')||h.includes('nom prenom j1'));

    const parseExcelDate = d => {
      if (!d) return todayStr();
      if (typeof d === 'number') { // serial Excel
        const dt = new Date(Math.round((d - 25569) * 86400000));
        return dt.toISOString().split('T')[0];
      }
      const s = String(d).trim();
      const m1 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (m1) return `${m1[3]}-${m1[2].padStart(2,'0')}-${m1[1].padStart(2,'0')}`;
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      return todayStr();
    };
    const parseTime = t => {
      if (!t && t !== 0) return '';
      if (typeof t === 'number') { // Excel time fraction
        const totalMin = Math.round(t * 1440);
        return `${String(Math.floor(totalMin/60)).padStart(2,'0')}:${String(totalMin%60).padStart(2,'0')}`;
      }
      return String(t).trim();
    };
    const detectFmt = cat => {
      const c = (cat||'').toLowerCase();
      if (/doub|double|dm\b|dd\b|dx\b|mx\b/.test(c)) return 'doubles';
      return 'bo3';
    };
    const g = (r, i) => (i!==undefined && r[i]!==undefined && r[i]!==null) ? String(r[i]).trim() : '';

    if (isFFT) {
      // ── Format FFT : Epreuve | Découpage | Tour | Date | Heure | Court | NomPrénom J1 | Licence J1 | Clt J1 | NomPrénom J2 | Licence J2 | Clt J2 | Résultat | Score | NomPrénom J3 | Licence J3 | Clt J3 | NomPrénom J4 | Licence J4 | Clt J4
      const hdr = rows[0];
      const idx = {};
      hdr.forEach((c,i) => {
        const h = String(c||'').toLowerCase().trim();
        if (h.includes('epreuve'))                     idx.cat   = i;
        else if (h.includes('découpage')||h.includes('decoupage')) idx.round = i;
        else if (h === 'tour')                         idx.tour  = i;
        else if (h === 'date')                         idx.date  = i;
        else if (h === 'heure')                        idx.time  = i;
        else if (h === 'court')                        idx.court = i;
        else if (h.includes('j1')&&(h.includes('nom')||h.includes('prénom'))) idx.p1n = i;
        else if (h === 'clt j1')                       idx.p1r = i;
        else if (h.includes('j2')&&(h.includes('nom')||h.includes('prénom'))) idx.p2n = i;
        else if (h === 'clt j2')                       idx.p2r = i;
        else if (h.includes('j3')&&(h.includes('nom')||h.includes('prénom'))) idx.p3n = i;
        else if (h === 'clt j3')                       idx.p3r = i;
        else if (h.includes('j4')&&(h.includes('nom')||h.includes('prénom'))) idx.p4n = i;
        else if (h === 'clt j4')                       idx.p4r = i;
      });
      return rows.slice(1).filter(r=>r&&g(r,idx.p1n)).map(r => {
        const p1n=g(r,idx.p1n), p2n=g(r,idx.p2n), p3n=g(r,idx.p3n), p4n=g(r,idx.p4n);
        const p1r=g(r,idx.p1r), p2r=g(r,idx.p2r), p3r=g(r,idx.p3r), p4r=g(r,idx.p4r);
        const isDoubles = !!p2n;
        const player1   = isDoubles ? `${p1n} / ${p2n}`.trim() : p1n;
        const player2   = isDoubles ? `${p3n}${p4n?' / '+p4n:''}`.trim() : p3n;
        const p1Ranking = isDoubles ? `${p1r}${p2r?' / '+p2r:''}`.trim() : p1r;
        const p2Ranking = isDoubles ? `${p3r}${p4r?' / '+p4r:''}`.trim() : p3r;
        const roundText = [g(r,idx.round), g(r,idx.tour)?`Tour ${g(r,idx.tour)}`:''].filter(Boolean).join(' – ');
        return newMatch({
          player1, player2, p1Ranking, p2Ranking, p1Club:'', p2Club:'',
          category: g(r,idx.cat), round: roundText, court: g(r,idx.court),
          format: isDoubles?'doubles':detectFmt(g(r,idx.cat)),
          scheduledTime: parseTime(r[idx.time]), date: parseExcelDate(r[idx.date]),
        });
      }).filter(m=>m.player1&&m.player2);
    } else {
      // ── Format template simple : J1 | J2 | ClubJ1 | ClubJ2 | Cl.J1 | Cl.J2 | Catégorie | Tour | Court | Format | Heure | Date
      return rows.slice(1).filter(r=>r&&r[0]&&r[1]).map(r=>newMatch({
        player1:g(r,0),player2:g(r,1),p1Club:g(r,2),p2Club:g(r,3),
        p1Ranking:g(r,4),p2Ranking:g(r,5),category:g(r,6),round:g(r,7),
        court:g(r,8),format:g(r,9)||'bo3',scheduledTime:g(r,10),
        date:parseExcelDate(r[11])||today,
      }));
    }
  };

  const handleXLS=e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'binary',cellDates:false});
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:true});
        const imp=parseXLSRows(rows);
        onImport(imp.map(m=>enrichMatch(m,settings?.players)));
      }catch(err){alert('Erreur : '+err.message);}
    };
    r.readAsBinaryString(file);e.target.value='';
  };
  const dlTpl=()=>{const ws=XLSX.utils.aoa_to_sheet([['Joueur1','Joueur2','ClubJ1','ClubJ2','Cl.J1','Cl.J2','Catégorie','Tour','Court','Format','Heure','Date'],['DUPONT Jean','MARTIN Paul','Club Léo Lagrange','TC Paris','30/2','30/3','SM Senior','1/4 finale','Court 1','bo3','18:00',today]]);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Matchs');XLSX.writeFile(wb,'modele_matchs.xlsx');};
  return(
    <div>
      <div className="flex ai gap3 mb4" style={{flexWrap:'wrap'}}>
        <h1>Matchs</h1>
        <div className="flex gap2 ml-a" style={{flexWrap:'wrap'}}>
          <input ref={xlsRef} type="file" accept=".xlsx,.xls" onChange={handleXLS} style={{display:'none'}}/>
          <button className="btn btn-sm" onClick={dlTpl}>⬇ Modèle Excel</button>
          <button className="btn btn-sm" onClick={()=>xlsRef.current?.click()}>⬆ Excel</button>
          <button className="btn btn-sm" onClick={()=>setShowPDF(true)}>📄 PDF</button>
          <button className="btn btn-sm" onClick={()=>{
            if(settings?.gsheetUrl){
              // URL déjà configurée → import direct sans modal
              setGSheetLoading(true);
              (async()=>{
                try{
                  const id=settings.gsheetUrl.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/)?.[1];
                  const gid=settings.gsheetUrl.match(/[#&?]gid=(\d+)/)?.[1]||'0';
                  if(!id)throw new Error('URL invalide dans les paramètres');
                  const resp=await fetch(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`);
                  if(!resp.ok)throw new Error(`Erreur ${resp.status} — vérifiez le partage du document`);
                  const text=await resp.text();
                  const rows=text.split(/\r?\n/).map(l=>{const cs=[],cur={v:'',q:false};for(const ch of l){if(ch==='"'&&!cur.q)cur.q=true;else if(ch==='"'&&cur.q)cur.q=false;else if(ch===','&&!cur.q){cs.push(cur.v.trim());cur.v='';}else cur.v+=ch;}cs.push(cur.v.trim());return cs;}).filter(r=>r.some(c=>c));
                  const ms=parseXLSRowsStatic(rows,todayStr(),settings);
                  if(!ms.length)throw new Error('Aucun match détecté');
                  onImport(ms.map(m=>enrichMatch(m,settings?.players)));
                  alert(`✅ ${ms.length} match(s) importés depuis Google Sheets`);
                }catch(e){alert('❌ '+e.message);}
                setGSheetLoading(false);
              })();
            } else {
              setShowGSheet(true);
            }
          }}>
            {gSheetLoading?'⏳…':'🔗 Google Sheets'}
          </button>
          <button className="btn btn-p btn-sm" onClick={()=>{setEditing(null);setShowModal(true);}}>+ Nouveau</button>
        </div>
      </div>
      <div className="flex gap2 mb4" style={{flexWrap:'wrap'}}>
        {[['all','Tous'],['today',"Auj."],['live','En cours'],['finished','Terminés']].map(([k,lbl])=>(
          <button key={k} className={`btn btn-sm ${filter===k?'btn-p':''}`} onClick={()=>setFilter(k)}>{lbl} <span style={{opacity:.7}}>({counts[k]||0})</span></button>
        ))}
      </div>
      {sorted.length===0
        ?<div className="card" style={{textAlign:'center',padding:40,color:'var(--txt-m)'}}><div style={{fontSize:36,marginBottom:10}}>🎾</div><p>Aucun match</p></div>
        :sorted.map(m=><MatchRowItem key={m.id} match={m} settings={settings}
            onEdit={()=>{setEditing(m);setShowModal(true);}}
            onDelete={()=>{if(confirm('Supprimer ?'))onDelete(m.id);}}
            onStatus={st=>onSetStatus(m.id,st)}
            onStart={()=>onStartWithServer(m)}
            onCorrect={()=>setCorrecting(m)}
            onWO={onWO} onPause={onPause} onResume={onResume}
            onAbandon={m=>setAbandonTarget(m)}/>)
      }
      {abandonTarget&&<AbandonModal match={abandonTarget}
        onConfirm={abandonBy=>{onSetStatus(abandonTarget.id,'finished',{abandonBy,winner:3-abandonBy});setAbandonTarget(null);}}
        onClose={()=>setAbandonTarget(null)}/>}
      {showModal&&<MatchModal match={editing} settings={settings} onSave={fd=>{if(editing)onEdit(editing.id,fd);else onAdd(fd);setShowModal(false);setEditing(null);}} onClose={()=>{setShowModal(false);setEditing(null);}}/>}
      {correcting&&<ScoreCorrectionModal match={correcting} settings={settings} onSave={m=>{onCorrect(m);setCorrecting(null);}} onClose={()=>setCorrecting(null)}/>}
      {showPDF&&<PDFImportModal settings={settings} onImport={onImport} onClose={()=>setShowPDF(false)}/>}
      {showGSheet&&<GSheetImportModal settings={settings} onImport={ms=>{onImport(ms);setShowGSheet(false);}} onClose={()=>setShowGSheet(false)}/>}
    </div>
  );
}

// ── ScorerTab — responsive tablette Android ──────────────────────
function ScorerTab({matches,settings,onAddGame,onUndo,onServer,onSetStatus,onStartWithServer,onPause,onResume,onWO,onAddPoint,onUndoPoint,onToggleMode}){
  const W=useWindowWidth();
  const isWide=W>=900, isMid=W>=600;
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [abandonMatchId,setAbandonMatchId]=useState(null);
  const [woMatchId,setWoMatchId]=useState(null);
  const today=todayStr();

  const groups=useMemo(()=>{
    // 1. Matchs du jour (en attente) + live/pause peu importe la date
    const todayActive=[...matches].filter(m=>
      (m.status==='live'||m.status==='paused') ||
      (m.date&&m.date===today&&m.status==='pending')
    ).sort((a,b)=>{
      const r=s=>s==='live'||s==='paused'?0:1;
      if(r(a.status)!==r(b.status))return r(a.status)-r(b.status);
      return timeToMin(a.scheduledTime)-timeToMin(b.scheduledTime);
    });
    // Live/pause sans date (match commencé avant d'avoir la date)
    const liveNoDate=[...matches].filter(m=>
      !m.date&&(m.status==='live'||m.status==='paused')
    );
    // 2. Matchs terminés du jour (ou live terminés peu importe date)
    const todayFinished=[...matches].filter(m=>
      m.status==='finished'&&m.date===today
    ).sort((a,b)=>timeToMin(a.scheduledTime)-timeToMin(b.scheduledTime));
    // 3. Matchs des autres jours en attente (avec date)
    const otherDays=[...matches].filter(m=>
      m.date&&m.date!==today&&m.status==='pending'
    ).sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):timeToMin(a.scheduledTime)-timeToMin(b.scheduledTime));
    return {today:[...todayActive,...liveNoDate], finished:todayFinished, other:otherDays};
  },[matches,today]);

  const all=useMemo(()=>[...groups.today,...groups.finished,...groups.other],[groups]);

  const [scoringIds,setScoringIds]=useState([]);
  const [now,setNow]=useState(Date.now());

  useEffect(()=>{
    setScoringIds(prev=>{
      const valid=prev.filter(id=>all.find(m=>m.id===id));
      const newLive=all.filter(m=>(m.status==='live'||m.status==='paused')&&!valid.includes(m.id)).map(m=>m.id);
      return [...valid,...newLive].slice(0,3);
    });
  },[all.map(m=>m.id+m.status).join()]);

  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),1000);return()=>clearInterval(t);},[]);

  const scoring=scoringIds.map(id=>all.find(m=>m.id===id)).filter(Boolean);

  const handleSideClick=m=>{
    // Pour tous les statuts : ajouter/retirer du panel de score
    setScoringIds(prev=>{
      if(prev.includes(m.id))return prev.filter(id=>id!==m.id);
      if(prev.length>=3)return[...prev.slice(1),m.id];
      return[...prev,m.id];
    });
    if(!isWide)setSidebarOpen(false);
  };

  // ── Composant item sidebar ───────────────────────────────────────
  const SideItem=({m})=>{
    const isScoring=scoringIds.includes(m.id);
    const mSW=countWonSets(m);
    const isML=m.status==='live',isPausedM=m.status==='paused',isDoneM=m.status==='finished';
    const borderC=isML?'var(--red)':isPausedM?'#b87000':isDoneM?'var(--green)':'var(--bdr)';
    return(
      <div onClick={()=>handleSideClick(m)}
        style={{padding:'10px 12px',borderRadius:'var(--r)',marginBottom:8,cursor:'pointer',
          border:`2px solid ${isScoring?(isML||isPausedM?'var(--red)':'var(--clay)'):'var(--bdr-l)'}`,
          background:isScoring?'var(--sand-l)':'var(--white)',transition:'all .15s',
          borderLeft:`5px solid ${borderC}`,opacity:isDoneM?.85:1,WebkitTapHighlightColor:'transparent'}}>
        <div style={{display:'flex',gap:6,marginBottom:4,alignItems:'center'}}>
          {isML?<span className="badge b-live" style={{fontSize:10}}><span className="dot"/>Live</span>
          :isPausedM?<span className="badge b-info" style={{fontSize:10}}>⏸ Pause</span>
          :isDoneM?<span className="badge b-done" style={{fontSize:10}}>{m.wo?'W.O.':m.abandonBy?'Ab.':'✓'}</span>
          :<span style={{fontSize:14,color:'var(--clay)',fontWeight:700}}>{m.scheduledTime||'—'}</span>}
          <span style={{fontSize:12,color:'var(--txt-l)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{m.category}</span>
          {isScoring&&<span style={{fontSize:10,background:'var(--clay)',color:'#fff',borderRadius:10,padding:'1px 6px'}}>●</span>}
        </div>
        <div style={{fontSize:15,fontFamily:'var(--fd)',fontWeight:700,lineHeight:1.4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{opacity:m.winner===2?.4:1,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{splitDouble(m.player1,m.p1Ranking,'')[0]?.n||m.player1}</span>
          {(isML||isPausedM||isDoneM)&&<span style={{color:'var(--clay)',fontWeight:800,marginLeft:6,fontSize:17}}>{mSW[0]}</span>}
        </div>
        <div style={{fontSize:15,fontFamily:'var(--fd)',fontWeight:700,lineHeight:1.4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{opacity:m.winner===1?.4:1,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{splitDouble(m.player2,m.p2Ranking,'')[0]?.n||m.player2}</span>
          {(isML||isPausedM||isDoneM)&&<span style={{color:'var(--clay)',fontWeight:800,marginLeft:6,fontSize:17}}>{mSW[1]}</span>}
        </div>
        {(isML||isPausedM||isDoneM)&&<div style={{fontSize:12,color:'var(--txt-l)',marginTop:3,fontFamily:'var(--fb)'}}>{scoreText(m)}</div>}
        {m.status==='pending'&&<div style={{fontSize:12,color:'var(--clay)',marginTop:3,fontFamily:'var(--fb)',fontStyle:'italic'}}>Appuyer pour démarrer</div>}
      </div>
    );
  };

  // ── Composant panel de score ─────────────────────────────────────
  const ScorePanel=({match})=>{
    const fmt=getFmt(match,settings),sw=countWonSets(match);
    const si=match.sets.length-1;
    const isLive=match.status==='live',isFinished=match.status==='finished',isPaused=match.status==='paused',isPending=match.status==='pending';
    const isSuperTBFinal=fmt.finalSuper&&match.sets.length===fmt.sets,isTBOnly=fmt.tbOnly;
    const isAtTB=!isSuperTBFinal&&!isTBOnly&&match.sets[si]&&match.sets[si][0]===6&&match.sets[si][1]===6;
    const canUndo=(match.history||[]).length>0;
    const dur=getMatchDur(match,now);
    const btnH=isWide?'70px':isMid?'64px':'56px';
    const btnFont=isWide?14:13;
    const isPointMode=match.scoringMode==='point';
    const isTB=isSuperTBFinal||isTBOnly||isAtTB;
    const gs=match.gameScore||[0,0];
    const gsLabel=p=>isTB?String(p):POINT_LABELS[Math.min(p,4)]||'Ad';

    return(
      <div style={{border:'1px solid var(--bdr-l)',borderRadius:'var(--rl)',overflow:'hidden',background:'var(--white)',boxShadow:'var(--shd)'}}>
        {/* Header avec toggle Jeu/Point */}
        <div style={{padding:'8px 12px',background:'var(--sand-l)',borderBottom:'1px solid var(--bdr-l)',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          {isLive?<span className="badge b-live" style={{fontSize:10}}><span className="dot"/>Live</span>
          :isPaused?<span className="badge b-info" style={{fontSize:10}}>⏸ Pause</span>
          :isFinished?<span className="badge b-done" style={{fontSize:10}}>✓ Terminé</span>
          :<span className="badge b-pend" style={{fontSize:10}}>⏳</span>}
          {match.category&&<span style={{fontSize:12,color:'var(--txt-m)'}}>{match.category}</span>}
          {match.court&&<span style={{fontSize:12,color:'var(--txt-l)'}}>• {match.court}</span>}
          {dur&&<span style={{fontSize:12,color:'var(--txt-m)',fontWeight:600}}>⏱ {dur}</span>}
          {(isLive||isPaused)&&<div style={{display:'flex',gap:0,border:'1px solid var(--bdr)',borderRadius:6,overflow:'hidden'}}>
            <button onClick={()=>onToggleMode(match.id,'game')} style={{padding:'3px 10px',fontSize:11,fontFamily:'var(--fb)',fontWeight:600,cursor:'pointer',border:'none',background:!isPointMode?'var(--clay)':'transparent',color:!isPointMode?'#fff':'var(--txt-m)'}}>Jeu</button>
            <button onClick={()=>onToggleMode(match.id,'point')} style={{padding:'3px 10px',fontSize:11,fontFamily:'var(--fb)',fontWeight:600,cursor:'pointer',border:'none',background:isPointMode?'var(--clay)':'transparent',color:isPointMode?'#fff':'var(--txt-m)'}}>Point</button>
          </div>}
          <button onClick={()=>setScoringIds(p=>p.filter(id=>id!==match.id))}
            style={{marginLeft:'auto',background:'none',border:'none',color:'var(--txt-l)',cursor:'pointer',fontSize:18,lineHeight:1,padding:'4px 6px',minWidth:36,minHeight:36}}>✕</button>
        </div>

        {/* Joueurs + score */}
        <div style={{padding:'8px 12px'}}>
          {[0,1].map(pi=>{
            const lead=sw[pi]>sw[1-pi],won=match.winner===pi+1;
            const pn=pi===0?match.player1:match.player2;
            const pr=pi===0?match.p1Ranking:match.p2Ranking;
            const pclub=pi===0?match.p1Club:match.p2Club;
            const parts=splitDouble(pn,pr,pclub);
            return(
              <div key={pi} className="srow">
                <div className="sname" style={{color:won?'var(--green)':undefined,flex:1}}>
                  {isLive&&match.server===pi+1&&<span style={{width:9,height:9,borderRadius:'50%',background:'var(--clay)',display:'inline-block',flexShrink:0,boxShadow:'0 0 6px var(--clay)'}}/>}
                  <div style={{lineHeight:1.4}}>
                    {parts.map((p,i)=>(
                      <div key={i}>
                        <span style={{fontFamily:'var(--fd)',fontSize:isWide?15:14,fontWeight:700}}>{p.n}</span>
                        {p.r&&<span style={{fontSize:11,color:'var(--clay)',fontFamily:'var(--fb)',fontWeight:600,marginLeft:5}}>{p.r}</span>}
                        {p.c&&<span style={{fontSize:11,color:'var(--txt-l)',fontFamily:'var(--fb)',fontWeight:400,marginLeft:4}}>{p.c}</span>}
                      </div>
                    ))}
                  </div>
                </div>
                <div className="ssets">
                  {match.sets.map((s,i)=>{
                    const w=(s[pi]>s[1-pi])&&(match.sets.length>i+1||isFinished);
                    return<div key={i} className={`sset${w?' w':''}`} style={{fontSize:i===si?18:13}}>{s[pi]}</div>;
                  })}
                </div>
                <div className="swon" style={{color:lead?'var(--dark)':'var(--txt-l)',fontSize:18}}>{sw[pi]}</div>
              </div>
            );
          })}
          {isAtTB&&<div style={{textAlign:'center',fontSize:12,color:'var(--clay)',fontWeight:700,fontFamily:'var(--fb)',padding:'4px 0'}}>⚡ TIE-BREAK</div>}
          {(isSuperTBFinal||isTBOnly)&&<div style={{textAlign:'center',fontSize:12,color:'var(--clay)',fontWeight:700,fontFamily:'var(--fb)',padding:'4px 0'}}>⚡ SUPER TIE-BREAK</div>}
        </div>

        {/* Actions */}
        <div style={{padding:'8px 12px',borderTop:'1px solid var(--bdr-l)'}}>

          {/* Terminé → annuler */}
          {isFinished&&(
            <div>
              <div style={{fontSize:12,color:'var(--red)',fontWeight:600,marginBottom:6}}>⚠️ Match clôturé — {scoreText(match)}</div>
              {canUndo?<button className="btn btn-sm" style={{borderColor:'var(--red)',color:'var(--red)',fontWeight:600,minHeight:44}} onClick={()=>onUndo(match.id)}>↩ Annuler et reprendre</button>
              :<span style={{fontSize:12,color:'var(--txt-l)'}}>Utilisez ✏ Score depuis l'onglet Matchs</span>}
            </div>
          )}

          {/* Match en attente : Démarrer ou W.O. */}
          {isPending&&(
            <div>
              <div style={{fontSize:13,color:'var(--txt-m)',fontFamily:'var(--fb)',marginBottom:12,lineHeight:1.4}}>
                {match.scheduledTime&&<><strong>{match.scheduledTime}</strong> · </>}{match.category}
                {match.court&&<> · {match.court}</>}
              </div>
              <div style={{display:'flex',gap:10}}>
                <button className="btn btn-p"
                  style={{flex:1,minHeight:btnH,flexDirection:'column',gap:6,fontSize:btnFont,WebkitTapHighlightColor:'transparent'}}
                  onClick={()=>onStartWithServer(match)}>
                  <span style={{fontSize:22}}>▶</span>
                  <span>Démarrer</span>
                </button>
                <button className="btn"
                  style={{flex:1,minHeight:btnH,flexDirection:'column',gap:6,fontSize:btnFont,borderColor:'#b87000',color:'#b87000',WebkitTapHighlightColor:'transparent'}}
                  onClick={()=>setWoMatchId(match.id)}>
                  <span style={{fontSize:22}}>🏳</span>
                  <span>W.O.</span>
                </button>
              </div>
            </div>
          )}

          {/* En pause */}
          {isPaused&&(
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',padding:'4px 0'}}>
              <span style={{fontFamily:'var(--fd)',fontWeight:700,color:'#b87000',fontSize:14,flex:1}}>⏸ Match en pause</span>
              <button className="btn btn-p btn-sm" style={{minHeight:44}} onClick={()=>onResume(match.id)}>▶ Reprendre</button>
              <button className="btn btn-sm" style={{borderColor:'var(--red)',color:'var(--red)',minHeight:44}} onClick={()=>{if(confirm('Terminer ?'))onSetStatus(match.id,'finished')}}>⏹ Fin</button>
            </div>
          )}

          {/* Live + vainqueur */}
          {isLive&&match.winner&&(
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <span style={{fontFamily:'var(--fd)',fontWeight:700,color:'var(--green)',fontSize:15,flex:1}}>🏆 {match.winner===1?match.player1:match.player2}</span>
              {canUndo&&<button className="btn btn-sm" style={{borderColor:'var(--red)',color:'var(--red)',minHeight:44,fontSize:13}} onClick={()=>onUndo(match.id)}>↩ Annuler</button>}
              <button className="btn btn-sm btn-g" style={{minHeight:44,fontSize:13}} onClick={()=>onSetStatus(match.id,'finished')}>✓ Clore</button>
            </div>
          )}

          {/* Live, pas de vainqueur → boutons score */}
          {isLive&&!match.winner&&(
            <div>
              {/* Indicateur TB */}
              {(isAtTB||isSuperTBFinal||isTBOnly)&&(
                <div style={{textAlign:'center',fontSize:11,color:'var(--clay)',fontWeight:700,marginBottom:6,fontFamily:'var(--fb)'}}>
                  ⚡ {isSuperTBFinal||isTBOnly?'SUPER TIE-BREAK':'TIE-BREAK'}
                  {isPointMode&&<span style={{marginLeft:8,opacity:.7}}>{gs[0]} – {gs[1]}</span>}
                </div>
              )}
              {/* Score dans le jeu (mode point) */}
              {isPointMode&&!isTB&&(
                <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:12,marginBottom:8,padding:'6px 12px',background:'var(--sand-l)',borderRadius:'var(--r)'}}>
                  <span style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:22,color:gs[0]>=3&&gs[0]>gs[1]?'var(--clay)':gs[0]>gs[1]?'var(--clay)':'var(--txt-m)',minWidth:36,textAlign:'right'}}>{gsLabel(gs[0])}</span>
                  <span style={{fontFamily:'var(--fb)',fontSize:14,color:'var(--txt-l)',opacity:.5}}>–</span>
                  <span style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:22,color:gs[1]>=3&&gs[1]>gs[0]?'var(--green)':gs[1]>gs[0]?'var(--green)':'var(--txt-m)',minWidth:36,textAlign:'left'}}>{gsLabel(gs[1])}</span>
                  {gs[0]===3&&gs[1]===3&&!fmt.noAd&&<span style={{fontFamily:'var(--fb)',fontSize:10,color:'var(--txt-l)',position:'absolute',marginTop:28}}>Déuce</span>}
                </div>
              )}
              {/* Annotations optionnelles (mode point) */}
              {isPointMode&&isLive&&!match.winner&&(
                <div style={{display:'flex',gap:8,marginTop:6,marginBottom:2,flexWrap:'wrap'}}>
                  <div style={{display:'flex',gap:3}}>
                    <span style={{fontSize:10,color:'var(--txt-l)',fontFamily:'var(--fb)',alignSelf:'center',marginRight:2}}>Balle :</span>
                    {[['1','1ère'],['2','2ème']].map(([v,lbl])=>(
                      <button key={v} onClick={()=>{onToggleMode&&onToggleMode(match.id,'_serve_'+v);}}
                        className="btn btn-sm"
                        style={{fontSize:11,padding:'4px 8px',minHeight:32,
                          background:match._pendingServe===v?'var(--clay)':'transparent',
                          color:match._pendingServe===v?'#fff':'var(--txt-m)',
                          borderColor:match._pendingServe===v?'var(--clay)':'var(--bdr)'}}>
                        {lbl}
                      </button>
                    ))}
                  </div>
                  <div style={{display:'flex',gap:3}}>
                    {[['ace','⚡ Ace'],['win','🎾 Pt gagnant'],['df','💥 DF'],['fe','❌ Faute']].map(([v,lbl])=>(
                      <button key={v} onClick={()=>{onToggleMode&&onToggleMode(match.id,'_type_'+v);}}
                        className="btn btn-sm"
                        style={{fontSize:11,padding:'4px 8px',minHeight:32,
                          background:match._pendingType===v?'var(--clay)':'transparent',
                          color:match._pendingType===v?'#fff':'var(--txt-m)',
                          borderColor:match._pendingType===v?'var(--clay)':'var(--bdr)'}}>
                        {lbl}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              {/* Gros boutons */}
              <div style={{display:'flex',gap:8,marginBottom:10}}>
                <button onClick={()=>isPointMode?onAddPoint(match.id,1):onAddGame(match.id,1)}
                  style={{flex:1,height:btnH,borderRadius:'var(--rl)',border:'2px solid var(--clay)',background:'rgba(196,92,38,.07)',color:'var(--clay)',fontFamily:'var(--fd)',fontWeight:700,fontSize:btnFont,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,WebkitTapHighlightColor:'transparent'}}>
                  <span style={{fontSize:20}}>{isPointMode?'●':'🎾'}</span>
                  <span style={{textAlign:'center',lineHeight:1.2,maxWidth:'90%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {splitDouble(match.player1,'','').map(p=>{const w=p.n.trim().split(' ');const c=w.filter(x=>x.length>1&&x===x.toUpperCase()&&!/\d/.test(x));return c.length>0?c.join(' '):w[0];}).join(' / ')}
                  </span>
                  {match.p1Ranking&&<span style={{fontSize:10,opacity:.7,fontWeight:400}}>{match.p1Ranking}</span>}
                </button>
                <button onClick={()=>isPointMode?onAddPoint(match.id,2):onAddGame(match.id,2)}
                  style={{flex:1,height:btnH,borderRadius:'var(--rl)',border:'2px solid var(--green)',background:'rgba(45,122,79,.07)',color:'var(--green)',fontFamily:'var(--fd)',fontWeight:700,fontSize:btnFont,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,WebkitTapHighlightColor:'transparent'}}>
                  <span style={{fontSize:20}}>{isPointMode?'●':'🎾'}</span>
                  <span style={{textAlign:'center',lineHeight:1.2,maxWidth:'90%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {splitDouble(match.player2,'','').map(p=>{const w=p.n.trim().split(' ');const c=w.filter(x=>x.length>1&&x===x.toUpperCase()&&!/\d/.test(x));return c.length>0?c.join(' '):w[0];}).join(' / ')}
                  </span>
                  {match.p2Ranking&&<span style={{fontSize:10,opacity:.7,fontWeight:400}}>{match.p2Ranking}</span>}
                </button>
              </div>
              {/* Service + actions */}
              <div style={{display:'flex',gap:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:'var(--txt-m)',marginBottom:4,letterSpacing:.5,textTransform:'uppercase',fontWeight:600}}>Service</div>
                  <div style={{display:'flex',gap:4}}>
                    <button className={`btn btn-sm ${match.server===1?'btn-p':''}`} style={{flex:1,fontSize:12,padding:'8px 4px',minHeight:40}} onClick={()=>onServer(match.id,1)}>{splitDouble(match.player1,'','').map(p=>{const w=p.n.trim().split(' ');const c=w.filter(x=>x.length>1&&x===x.toUpperCase()&&!/\d/.test(x));return c.length>0?c.join(' '):w[0];}).join('/')}</button>
                    <button className={`btn btn-sm ${match.server===2?'btn-p':''}`} style={{flex:1,fontSize:12,padding:'8px 4px',minHeight:40}} onClick={()=>onServer(match.id,2)}>{splitDouble(match.player2,'','').map(p=>{const w=p.n.trim().split(' ');const c=w.filter(x=>x.length>1&&x===x.toUpperCase()&&!/\d/.test(x));return c.length>0?c.join(' '):w[0];}).join('/')}</button>
                  </div>
                </div>
                <div>
                  <div style={{fontSize:10,color:'var(--txt-m)',marginBottom:4,letterSpacing:.5,textTransform:'uppercase',fontWeight:600}}>Actions</div>
                  <div style={{display:'flex',gap:4}}>
                    {canUndo&&<button className="btn btn-sm" style={{fontSize:12,padding:'8px 10px',minHeight:40,minWidth:44}} onClick={()=>isPointMode?onUndoPoint(match.id):onUndo(match.id)}>↩</button>}
                    <button className="btn btn-sm" style={{fontSize:12,padding:'8px',minHeight:40,minWidth:44,borderColor:'#b87000',color:'#b87000'}} onClick={()=>onPause(match.id)}>⏸</button>
                    <button className="btn btn-sm" style={{fontSize:12,padding:'8px',minHeight:40,borderColor:'var(--red)',color:'var(--red)'}} onClick={()=>setAbandonMatchId(match.id)}>⚠</button>
                    <button className="btn btn-sm" style={{fontSize:12,padding:'8px 10px',minHeight:40,minWidth:44,borderColor:'var(--red)',color:'var(--red)'}} onClick={()=>{if(confirm('Terminer ?'))onSetStatus(match.id,'finished')}}>⏹</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  };

  if(all.length===0)return(
    <div style={{padding:24}}>
      <div className="card" style={{textAlign:'center',padding:48,color:'var(--txt-m)'}}>
        <div style={{fontSize:40,marginBottom:12}}>🎾</div>
        <h3 style={{marginBottom:6}}>Aucun match à gérer</h3>
        <p style={{fontSize:14}}>Créez des matchs depuis l'onglet Matchs</p>
      </div>
    </div>
  );

  const abandonMatch=all.find(m=>m.id===abandonMatchId);
  const woMatch=all.find(m=>m.id===woMatchId);
  // Modal WO réutilise AbandonModal avec libellé adapté via un wrapper
  const WOModal=({match})=>(
    <div className="overlay" onClick={()=>setWoMatchId(null)}>
      <div className="modal" style={{maxWidth:440}} onClick={e=>e.stopPropagation()}>
        <h2 className="mb2">🏳 Walkover (W.O.)</h2>
        <p style={{fontSize:13,color:'var(--txt-m)',fontFamily:'var(--fb)',marginBottom:20,lineHeight:1.4}}>
          {match.player1} <span style={{opacity:.4}}>vs</span> {match.player2}<br/>
          <span style={{fontSize:12,opacity:.6}}>Le match n'a pas démarré — qui déclare forfait ?</span>
        </p>
        <div className="lbl mb3">Qui est absent / forfait ?</div>
        <div className="flex gap3">
          {[1,2].map(pi=>{
            const name=pi===1?match.player1:match.player2;
            const other=pi===1?match.player2:match.player1;
            const sn=n=>n.split(' / ').map(x=>x.trim().split(' ').slice(0,2).join(' ')).join(' / ');
            return(
              <button key={pi} className="btn" style={{flex:1,flexDirection:'column',padding:'16px 10px',gap:6,textAlign:'center',borderColor:'#b87000',color:'#b87000'}}
                onClick={()=>{onWO(match.id,3-pi);setWoMatchId(null);}}>
                <span style={{fontSize:22}}>🏳</span>
                <span style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:13,lineHeight:1.3}}>{sn(name)} forfait</span>
                <span style={{fontSize:11,opacity:.6,marginTop:2}}>→ {sn(other)} gagne</span>
              </button>
            );
          })}
        </div>
        <div className="flex je mt3"><button className="btn" onClick={()=>setWoMatchId(null)}>Annuler</button></div>
      </div>
    </div>
  );

  // ── Layout paysage (≥900px) : sidebar fixe + grille ──────────────
  if(isWide)return(
    <div style={{display:'flex',height:'calc(100vh - 108px)',overflow:'hidden'}}>
      {abandonMatch&&<AbandonModal match={abandonMatch} onConfirm={abandonBy=>{onSetStatus(abandonMatch.id,'finished',{abandonBy,winner:3-abandonBy});setAbandonMatchId(null);}} onClose={()=>setAbandonMatchId(null)}/>}
      {woMatch&&<WOModal match={woMatch}/>}
      <div style={{width:'30%',minWidth:180,maxWidth:280,borderRight:'1px solid var(--bdr-l)',overflowY:'auto',background:'var(--cream)',padding:'10px 8px'}}>
        {/* Section 1 : matchs du jour */}
        <div className="lbl" style={{marginBottom:6,paddingLeft:4}}>Matchs du jour</div>
        {groups.today.length===0
          ?<div style={{fontSize:12,color:'var(--txt-l)',fontFamily:'var(--fb)',padding:'4px 4px 8px',fontStyle:'italic'}}>Aucun match aujourd'hui</div>
          :groups.today.map(m=><SideItem key={m.id} m={m}/>)
        }
        {/* Section 2 : terminés */}
        {groups.finished.length>0&&<>
          <div className="lbl" style={{marginTop:8,marginBottom:6,paddingLeft:4,paddingTop:8,borderTop:'1px solid var(--bdr-l)'}}>Terminés</div>
          {groups.finished.map(m=><SideItem key={m.id} m={m}/>)}
        </>}
        {/* Section 3 : autres jours */}
        {groups.other.length>0&&<>
          <div className="lbl" style={{marginTop:8,marginBottom:6,paddingLeft:4,paddingTop:8,borderTop:'1px solid var(--bdr-l)'}}>Autres jours</div>
          {groups.other.map(m=><SideItem key={m.id} m={m}/>)}
        </>}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'10px 12px'}}>
        {scoring.length===0?(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:10,color:'var(--txt-l)',textAlign:'center',padding:24}}>
            <div style={{fontSize:44}}>🎾</div>
            <div style={{fontFamily:'var(--fd)',fontSize:16,color:'var(--txt-m)'}}>Sélectionnez un match à gauche</div>
            <div style={{fontSize:13}}>Jusqu'à 3 matchs simultanément</div>
          </div>
        ):(
          <div style={{display:'grid',gridTemplateColumns:scoring.length===1?'1fr':'1fr 1fr',gap:12,alignItems:'start'}}>
            {scoring.map((m,i)=>(
              <div key={m.id} style={scoring.length===3&&i===2?{gridColumn:'1 / -1',maxWidth:'50%'}:{}}>
                <ScorePanel match={m}/>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );

  return(
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 108px)',overflow:'hidden',position:'relative'}}>
      {abandonMatch&&<AbandonModal match={abandonMatch} onConfirm={abandonBy=>{onSetStatus(abandonMatch.id,'finished',{abandonBy,winner:3-abandonBy});setAbandonMatchId(null);}} onClose={()=>setAbandonMatchId(null)}/>}
      {woMatch&&<WOModal match={woMatch}/>}
      {/* Barre du haut */}
      <div style={{padding:'8px 12px',background:'var(--sand-l)',borderBottom:'1px solid var(--bdr-l)',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',flexShrink:0}}>
        <button onClick={()=>setSidebarOpen(o=>!o)}
          style={{padding:'8px 14px',borderRadius:'var(--r)',border:'1px solid var(--bdr)',background:'var(--white)',cursor:'pointer',fontFamily:'var(--fb)',fontSize:14,display:'flex',alignItems:'center',gap:6,minHeight:44}}>
          ☰ Matchs <span style={{background:'var(--clay)',color:'#fff',borderRadius:10,padding:'1px 7px',fontSize:12,fontWeight:700}}>{all.length}</span>
        </button>
        {all.filter(m=>m.status==='live'||m.status==='paused').map(m=>{
          const sel=scoringIds.includes(m.id);
          const isPausedM=m.status==='paused';
          return(
            <button key={m.id} onClick={()=>handleSideClick(m)}
              style={{padding:'6px 12px',borderRadius:20,border:`2px solid ${sel?(isPausedM?'#b87000':'var(--red)'):'var(--bdr)'}`,background:sel?'rgba(180,40,40,.08)':'var(--white)',cursor:'pointer',fontSize:13,fontFamily:'var(--fd)',fontWeight:600,color:sel?(isPausedM?'#b87000':'var(--red)'):'var(--txt)',minHeight:44,display:'flex',alignItems:'center',gap:5}}>
              {isPausedM?'⏸':'●'} {splitDouble(m.player1,'','')[0]?.n.split(' ')[0]} / {splitDouble(m.player2,'','')[0]?.n.split(' ')[0]}
            </button>
          );
        })}
        {all.filter(m=>m.status==='pending').length>0&&(
          <span style={{fontSize:12,color:'var(--txt-l)',fontFamily:'var(--fb)'}}>
            {all.filter(m=>m.status==='pending').length} à venir
          </span>
        )}
      </div>
      {/* Zone score */}
      <div style={{flex:1,overflowY:'auto',padding:'10px 12px'}}>
        {scoring.length===0?(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:10,color:'var(--txt-l)',textAlign:'center',padding:24}}>
            <div style={{fontSize:44}}>🎾</div>
            <div style={{fontFamily:'var(--fd)',fontSize:16,color:'var(--txt-m)'}}>Appuyez sur ☰ Matchs pour démarrer</div>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {scoring.map(m=><ScorePanel key={m.id} match={m}/>)}
          </div>
        )}
      </div>
      {/* Drawer */}
      {sidebarOpen&&(
        <>
          <div onClick={()=>setSidebarOpen(false)} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.4)',zIndex:10}}/>
          <div style={{position:'absolute',top:0,left:0,bottom:0,width:Math.min(W*0.8,340),background:'var(--cream)',zIndex:11,overflowY:'auto',padding:'12px 10px',boxShadow:'4px 0 20px rgba(0,0,0,.2)'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <div className="lbl" style={{margin:0}}>Programme</div>
              <button onClick={()=>setSidebarOpen(false)} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--txt-m)',padding:'4px 8px',minHeight:44,minWidth:44}}>✕</button>
            </div>
            <div className="lbl" style={{marginBottom:6,fontSize:10}}>Matchs du jour</div>
            {groups.today.length===0
              ?<div style={{fontSize:12,color:'var(--txt-l)',fontFamily:'var(--fb)',padding:'4px 4px 8px',fontStyle:'italic'}}>Aucun match aujourd'hui</div>
              :groups.today.map(m=><SideItem key={m.id} m={m}/>)
            }
            {groups.finished.length>0&&<>
              <div className="lbl" style={{marginTop:8,marginBottom:6,paddingTop:8,borderTop:'1px solid var(--bdr-l)',fontSize:10}}>Terminés</div>
              {groups.finished.map(m=><SideItem key={m.id} m={m}/>)}
            </>}
            {groups.other.length>0&&<>
              <div className="lbl" style={{marginTop:8,marginBottom:6,paddingTop:8,borderTop:'1px solid var(--bdr-l)',fontSize:10}}>Autres jours</div>
              {groups.other.map(m=><SideItem key={m.id} m={m}/>)}
            </>}
          </div>
        </>
      )}
    </div>
  );
}

// ── SettingsTab ──────────────────────────────────────────────────
function SettingsTab({settings,onSave,fbConfig,onFBSave,fbStatus}){
  const [form,setForm]=useState(deepCopy(settings));
  const [showFB,setShowFB]=useState(false);
  const [spIn,setSpIn]=useState('');
  const [catIn,setCatIn]=useState('');
  const [playerIn,setPlayerIn]=useState({name:'',club:'',ranking:''});
  const [courtIn,setCourtIn]=useState('');
  const s=(k,v)=>setForm(f=>({...f,[k]:v}));
  const upImg=(e,key)=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>s(key,ev.target.result);r.readAsDataURL(file);};
  const upSpLogo=(e,i)=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>s('sponsors',form.sponsors.map((sp,j)=>j===i?{...sp,logo:ev.target.result}:sp));r.readAsDataURL(file);};
  const fbRef=useRef();
  const expFB=()=>{if(!fbConfig)return alert('Aucune config');const b=new Blob([JSON.stringify(fbConfig,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='firebase-config.json';a.click();};
  const impFB=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{onFBSave(JSON.parse(ev.target.result));}catch(e){alert('JSON invalide');}};r.readAsText(file);e.target.value='';};
  return(
    <div>
      <div className="flex ai jb mb4"><h1>Paramètres</h1><button className="btn btn-p" onClick={()=>onSave(form)}>💾 Enregistrer</button></div>
      <div className="g2" style={{gap:20,alignItems:'start'}}>
        <div>
          <div className="card mb4">
            <div className="flex ai gap2 mb3"><h3>🔥 Firebase</h3>
              <span style={{marginLeft:'auto',fontSize:12,padding:'2px 9px',borderRadius:20,background:fbStatus==='connected'?'var(--green-l)':'var(--sand-l)',color:fbStatus==='connected'?'var(--green)':'var(--txt-l)',border:'1px solid',borderColor:fbStatus==='connected'?'rgba(45,122,79,.25)':'var(--bdr-l)'}}>{fbStatus==='connected'?'● Connecté':'○ Non connecté'}</span>
            </div>
            {fbStatus!=='connected'&&<div className="warn-box">Sans Firebase, la synchro entre appareils ne fonctionne pas.</div>}
            {fbStatus==='connected'&&<div className="info-box">✅ Synchronisation active — tous vos appareils sont connectés.</div>}
            {FIREBASE_CONFIG_BUILTIN.databaseURL&&(
              <div className="info-box" style={{marginBottom:12}}>
                📌 <strong>Config intégrée au fichier</strong> — fonctionne sur tous les PC sans reconfiguration.
              </div>
            )}
            {!FIREBASE_CONFIG_BUILTIN.databaseURL&&(
              <div className="warn-box">
                💡 <strong>Astuce :</strong> Pour ne plus jamais resaisir la config en changeant de PC, ouvrez le fichier HTML dans un éditeur de texte et remplissez les champs <code>FIREBASE_CONFIG_BUILTIN</code> en haut du fichier. La config sera intégrée et fonctionnera partout automatiquement.
              </div>
            )}
            <div className="flex gap2" style={{flexWrap:'wrap'}}>
              <button className="btn btn-sm btn-p" onClick={()=>setShowFB(true)}>⚙ Configurer</button>
              <button className="btn btn-sm" onClick={expFB}>⬇ Exporter config</button>
              <input ref={fbRef} type="file" accept=".json" onChange={impFB} style={{display:'none'}}/>
              <button className="btn btn-sm" onClick={()=>fbRef.current?.click()}>⬆ Importer config</button>
              {fbConfig&&!FIREBASE_CONFIG_BUILTIN.databaseURL&&(
                <button className="btn btn-sm" style={{borderColor:'var(--clay)',color:'var(--clay)'}}
                  onClick={()=>{
                    const txt=JSON.stringify(fbConfig);
                    const msg=`Copiez ces valeurs dans le fichier HTML (bloc FIREBASE_CONFIG_BUILTIN) :\n\n${Object.entries(fbConfig).map(([k,v])=>`  ${k}: "${v}"`).join(',\n')}`;
                    prompt('Config à copier dans le fichier HTML :', msg);
                  }}>
                  📋 Voir la config à intégrer
                </button>
              )}
            </div>
          </div>
          <div className="card mb4">
            <h3 className="mb3">🎨 Thème</h3>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
              {Object.entries(THEMES).map(([key,th])=>{
                const sel=(form.theme||'terre_battue')===key;
                return(
                  <div key={key} onClick={()=>{
                    s('theme',key);s('bgColor',th.tv.bgColor);
                    s('primaryColor',th.tv.primaryColor);s('textColor',th.tv.textColor);s('accentColor',th.tv.accentColor);
                  }}
                  style={{cursor:'pointer',borderRadius:'var(--rl)',overflow:'hidden',border:`2px solid ${sel?th.admin.clay:'var(--bdr-l)'}`,boxShadow:sel?`0 0 0 3px ${th.admin.clay}33`:'none',transition:'all .2s'}}>
                    <div style={{background:th.tv.bgColor,padding:'10px 12px',minHeight:72,position:'relative'}}>
                      <div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:11,color:th.tv.textColor,marginBottom:3}}>DUPONT</div>
                      <div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:11,color:th.tv.textColor,opacity:.45,marginBottom:7}}>MARTIN</div>
                      <div style={{display:'flex',gap:4,alignItems:'center'}}>
                        <span style={{background:th.tv.primaryColor,borderRadius:3,padding:'2px 6px',fontSize:9,color:'#fff',fontWeight:700,fontFamily:'var(--fb)'}}>LIVE</span>
                        <span style={{color:th.tv.accentColor,fontFamily:'var(--fd)',fontWeight:900,fontSize:14,marginLeft:4}}>6</span>
                        <span style={{color:th.tv.textColor,opacity:.4,fontFamily:'var(--fd)',fontWeight:700,fontSize:14}}>3</span>
                      </div>
                      {sel&&<span style={{position:'absolute',top:5,right:7,fontSize:14,color:th.tv.accentColor}}>✓</span>}
                    </div>
                    <div style={{padding:'7px 10px',background:sel?`${th.admin.clay}15`:'var(--cream)',borderTop:'1px solid var(--bdr-l)'}}>
                      <div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:12,color:sel?th.admin.clay:'var(--txt)'}}>{th.label}</div>
                      <div style={{fontFamily:'var(--fb)',fontSize:10,color:'var(--txt-l)',marginTop:1}}>{th.subtitle}</div>
                    </div>
                  </div>
                );
              })}
            </div>
            <p style={{fontSize:12,color:'var(--txt-l)',fontFamily:'var(--fb)',marginTop:10}}>S'applique à l'admin et à l'écran TV. Les couleurs TV restent ajustables manuellement ci-dessous.</p>
          </div>
          <div className="card mb4">
            <h3 className="mb3">🏆 Tournoi</h3>
            <div className="mb3"><label className="lbl">Nom du tournoi</label><input className="inp" value={form.tournamentName} onChange={e=>s('tournamentName',e.target.value)}/></div>
            <div><label className="lbl">Nom du club</label><input className="inp" value={form.clubName} onChange={e=>s('clubName',e.target.value)}/></div>
          </div>
          <div className="card mb4">
            <h3 className="mb3">🔗 Google Sheets</h3>
            <p style={{fontSize:13,color:'var(--txt-m)',fontFamily:'var(--fb)',marginBottom:10,lineHeight:1.5}}>
              Collez l'URL de votre Google Sheet de matchs. Le bouton "🔗 Google Sheets" importera directement sans demander l'URL.
            </p>
            <label className="lbl">URL du Google Sheet</label>
            <input className="inp" value={form.gsheetUrl||''} onChange={e=>s('gsheetUrl',e.target.value)} placeholder="https://docs.google.com/spreadsheets/d/..." style={{fontSize:13,fontFamily:'monospace'}}/>
            {form.gsheetUrl&&<div className="info-box" style={{marginTop:10,marginBottom:0}}>✅ Import en 1 clic configuré — le bouton importera automatiquement sans afficher de fenêtre.</div>}
          </div>
          <div className="card mb4">
            <h3 className="mb3">🌤 Météo TV</h3>
            <p style={{fontSize:13,color:'var(--txt-m)',fontFamily:'var(--fb)',marginBottom:10}}>Affiche la météo en temps réel dans le header TV. Coordonnées GPS de votre club.</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              <div><label className="lbl">Latitude</label><input className="inp" value={form.weatherLat||''} onChange={e=>s('weatherLat',e.target.value)} placeholder="ex: 50.6900"/></div>
              <div><label className="lbl">Longitude</label><input className="inp" value={form.weatherLon||''} onChange={e=>s('weatherLon',e.target.value)} placeholder="ex: 2.8800"/></div>
            </div>
            <div className="mb2"><label className="lbl">Ville (affiché sous la météo)</label><input className="inp" value={form.weatherCity||''} onChange={e=>s('weatherCity',e.target.value)} placeholder="ex: Armentières"/></div>
            <button className="btn btn-sm" onClick={()=>{
              if(!navigator.geolocation)return alert('Géolocalisation non supportée');
              navigator.geolocation.getCurrentPosition(p=>{s('weatherLat',p.coords.latitude.toFixed(4));s('weatherLon',p.coords.longitude.toFixed(4));},()=>alert('Position indisponible'));
            }}>📍 Utiliser ma position</button>
            {form.weatherLat&&form.weatherLon&&<div className="info-box" style={{marginTop:10,marginBottom:0}}>✅ Météo activée — {form.weatherCity||form.weatherLat+', '+form.weatherLon}</div>}
          </div>
          <div className="card mb4">
            <h3 className="mb3">📱 QR Code TV</h3>
            <p style={{fontSize:13,color:'var(--txt-m)',fontFamily:'var(--fb)',marginBottom:10}}>Affiche un QR code dans le header TV. Les spectateurs scannent pour accéder aux scores sur leur téléphone.</p>
            <label className="lbl">URL à afficher dans le QR code</label>
            <input className="inp" value={form.tvUrl||''} onChange={e=>s('tvUrl',e.target.value)} placeholder="https://votre-site.netlify.app"/>
            {form.tvUrl&&<div style={{marginTop:12,display:'flex',alignItems:'center',gap:12}}>
              <img src={'https://api.qrserver.com/v1/create-qr-code/?size=80x80&data='+encodeURIComponent(form.tvUrl)} style={{width:80,height:80,borderRadius:6,border:'1px solid var(--bdr-l)'}} alt="QR"/>
              <span style={{fontSize:13,color:'var(--txt-m)',fontFamily:'var(--fb)'}}>Aperçu — laisser vide pour masquer le QR</span>
            </div>}
          </div>
          <div className="card mb4">
            <h3 className="mb3">🎾 Courts</h3>
            <p style={{fontSize:13,color:'var(--txt-m)',fontFamily:'var(--fb)',marginBottom:10}}>Liste des courts proposés au démarrage d'un match.</p>
            <div className="flex gap2 mb3">
              <input className="inp" value={courtIn||''} onChange={e=>setCourtIn(e.target.value)} placeholder="Ex: Court N°3" onKeyDown={e=>{if(e.key==='Enter'&&(courtIn||'').trim()){s('courts',[...(form.courts||[]),courtIn.trim()]);setCourtIn('');}}}/>
              <button className="btn btn-p btn-sm" onClick={()=>{if((courtIn||'').trim()){s('courts',[...(form.courts||[]),courtIn.trim()]);setCourtIn('');}}}>+</button>
            </div>
            {(form.courts||[]).map((c,i)=>(
              <div key={i} className="flex ai gap2 mb2">
                <input className="inp" value={c} onChange={e=>s('courts',(form.courts||[]).map((x,j)=>j===i?e.target.value:x))} style={{padding:'5px 8px',fontSize:13}}/>
                <button className="btn btn-xs btn-ghost" style={{color:'var(--red)'}} onClick={()=>s('courts',(form.courts||[]).filter((_,j)=>j!==i))}>✕</button>
              </div>
            ))}
          </div>
          <div className="card mb4">
            <h3 className="mb3">📋 Catégories</h3>
            <div className="flex gap2 mb3">
              <input className="inp" value={catIn} onChange={e=>setCatIn(e.target.value)} placeholder="Nouvelle catégorie" onKeyDown={e=>{if(e.key==='Enter'&&catIn.trim()){s('categories',[...form.categories,catIn.trim()]);setCatIn('');}}}/>
              <button className="btn btn-p btn-sm" onClick={()=>{if(catIn.trim()){s('categories',[...form.categories,catIn.trim()]);setCatIn('');}}}>+</button>
            </div>
            {(form.categories||[]).map((c,i)=>(
              <div key={i} className="flex ai gap2 mb2">
                <input className="inp" value={c} onChange={e=>s('categories',form.categories.map((x,j)=>j===i?e.target.value:x))} style={{padding:'5px 8px',fontSize:13}}/>
                <button className="btn btn-xs btn-ghost" style={{color:'var(--red)'}} onClick={()=>s('categories',form.categories.filter((_,j)=>j!==i))}>✕</button>
              </div>
            ))}
          </div>
          <div className="card mb4">
            <h3 className="mb3">👤 Liste des joueurs</h3>
            <p style={{fontSize:13,color:'var(--txt-m)',fontFamily:'var(--fb)',marginBottom:12,lineHeight:1.5}}>
              Associez nom → club + classement. Lors d'un import PDF, Excel ou Google Sheets, les joueurs reconnus seront automatiquement complétés.
            </p>
            {/* Import rapide CSV/Excel */}
            <div className="mb3" style={{padding:'10px 12px',background:'var(--sand-l)',borderRadius:'var(--r)'}}>
              <div className="lbl mb2">Import rapide depuis un fichier (CSV ou Excel)</div>
              <div style={{fontSize:12,color:'var(--txt-m)',fontFamily:'var(--fb)',marginBottom:8}}>Colonnes attendues : <strong>Nom Prénom, Club, Classement</strong></div>
              <input type="file" id="players-import" accept=".csv,.xlsx,.xls" style={{display:'none'}} onChange={e=>{
                const file=e.target.files[0];if(!file)return;
                const r=new FileReader();
                r.onload=ev=>{
                  try{
                    let rows;
                    if(file.name.endsWith('.csv')){
                      rows=ev.target.result.split(/\r?\n/).map(l=>l.split(',').map(c=>c.trim().replace(/^"|"$/g,'')));
                    } else {
                      const wb=XLSX.read(ev.target.result,{type:'binary'});
                      rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
                    }
                    const imported=rows.slice(1).filter(r=>r[0]).map(r=>({name:String(r[0]||'').trim(),club:String(r[1]||'').trim(),ranking:String(r[2]||'').trim()})).filter(p=>p.name);
                    // Les joueurs importés écrasent les existants (même nom = mise à jour)
                    const kept=(form.players||[]).filter(p=>!imported.find(i=>i.name.toLowerCase()===p.name.toLowerCase()));
                    s('players',[...kept,...imported]);
                    alert(`✅ ${imported.length} joueur(s) importé(s)`);
                  }catch(err){alert('Erreur : '+err.message);}
                };
                file.name.endsWith('.csv')?r.readAsText(file):r.readAsBinaryString(file);
                e.target.value='';
              }}/>
